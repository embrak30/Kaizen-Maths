<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Classroom Displays | Kaizen Maths</title>
  <style>
    :root {
      --ink: #14263a;
      --muted: #64748b;
      --line: #d8e2ef;
      --paper: #ffffff;
      --soft: #f6fbff;
      --teal: #13aaa7;
      --teal-dark: #087a76;
      --orange: #f97316;
      --purple: #6554c0;
      --blue: #2563eb;
      --green: #16a34a;
      --shadow: 0 16px 42px rgba(20, 38, 58, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef5f8;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background:
        linear-gradient(135deg, rgba(19, 170, 167, 0.10), rgba(249, 115, 22, 0.08)),
        repeating-linear-gradient(135deg, rgba(37, 99, 235, 0.05) 0 1px, transparent 1px 30px),
        #f8fcff;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 76px;
      padding: 12px 16px;
      color: #fff;
      background: linear-gradient(135deg, #122b46, #174d67 58%, #087a76);
      box-shadow: 0 8px 24px rgba(12, 26, 46, 0.18);
      z-index: 5;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.08;
    }

    .brand p {
      margin: 4px 0 0;
      color: #d9f5f4;
      font-size: 0.84rem;
      font-weight: 680;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mode-btn,
    .action-btn {
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 7px;
      color: #fff;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.24);
      font-weight: 850;
    }

    .mode-btn.active {
      color: #10243c;
      background: #ffffff;
      border-color: #ffffff;
    }

    .action-btn {
      background: var(--orange);
      border-color: var(--orange);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 315px minmax(0, 1fr);
    }

    .panel {
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      background: rgba(255, 255, 255, 0.92);
      border-right: 1px solid var(--line);
    }

    .panel-section {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(20, 38, 58, 0.06);
    }

    .panel-section + .panel-section {
      margin-top: 10px;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: var(--teal-dark);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .panel-note {
      margin: 0;
      color: #42526b;
      font-size: 0.84rem;
      line-height: 1.32;
      font-weight: 650;
    }

    .control-row {
      display: grid;
      gap: 5px;
      margin-top: 10px;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #253858;
      font-size: 0.82rem;
      font-weight: 850;
    }

    .control-row span {
      color: var(--teal-dark);
      font-weight: 900;
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      min-height: 38px;
      border: 1px solid #bed0df;
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--ink);
      background: #fff;
      font-weight: 800;
    }

    input[type="range"] {
      accent-color: var(--teal);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: #253858;
      font-size: 0.84rem;
      font-weight: 850;
    }

    .board-shell {
      min-height: 0;
      padding: 16px;
      display: grid;
      background: rgba(216, 226, 239, 0.68);
      overflow: hidden;
    }

    .board {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid #bfd0df;
      border-radius: 9px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .board.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 30;
      border: 0;
      border-radius: 0;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 50px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #ffffff, #f2fffe);
    }

    .board-title {
      margin: 0;
      color: #14263a;
      font-size: 1rem;
      font-weight: 950;
    }

    .board-equation {
      color: var(--purple);
      font-family: "Latin Modern Math", "STIX Two Math", "Cambria Math", "Times New Roman", serif;
      font-size: 1.05rem;
      font-weight: 780;
      text-align: right;
    }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 10px;
      overflow: hidden;
    }

    .stage svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .axis {
      stroke: #172f4a;
      stroke-width: 2.3;
    }

    .grid-line {
      stroke: #dbe6f1;
      stroke-width: 1;
    }

    .grid-major {
      stroke: #c5d4e1;
      stroke-width: 1.4;
    }

    .base-curve {
      fill: none;
      stroke: #64748b;
      stroke-width: 3;
      stroke-dasharray: 9 7;
    }

    .main-curve {
      fill: none;
      stroke: var(--teal);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .secondary-curve {
      fill: none;
      stroke: var(--orange);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shape-line {
      fill: none;
      stroke: #14263a;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .circle-line {
      fill: #fff;
      stroke: #14263a;
      stroke-width: 4;
    }

    .circle-equation-line {
      fill: none;
    }

    .theorem-line {
      fill: none;
      stroke: #14263a;
      stroke-width: 3.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .highlight-line {
      fill: none;
      stroke: var(--teal);
      stroke-width: 4.5;
      stroke-linecap: round;
    }

    .angle-mark {
      fill: none;
      stroke: var(--orange);
      stroke-width: 4;
      stroke-linecap: round;
    }

    .point-dot {
      fill: #14263a;
      stroke: #fff;
      stroke-width: 3;
    }

    .label-text {
      fill: #14263a;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 18px;
      font-weight: 900;
      paint-order: stroke;
      stroke: white;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .math-label {
      fill: var(--purple);
      font-family: "Latin Modern Math", "STIX Two Math", "Cambria Math", "Times New Roman", serif;
      font-size: 22px;
      font-weight: 780;
      paint-order: stroke;
      stroke: white;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .inline-frac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      line-height: 1;
      margin: 0 2px;
    }

    .inline-frac span:first-child {
      border-bottom: 1.8px solid currentColor;
      padding: 0 4px 2px;
    }

    .inline-frac span:last-child {
      padding-top: 2px;
    }

    .drag-point {
      cursor: grab;
      touch-action: none;
    }

    .drag-point:active {
      cursor: grabbing;
    }

    .drag-target {
      fill: transparent;
      pointer-events: all;
    }

    .drag-ring {
      fill: #ffffff;
      stroke: var(--orange);
      stroke-width: 3;
    }

    .label-text,
    .math-label {
      pointer-events: none;
    }

    @media (max-width: 920px) {
      html,
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .panel {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .board-shell {
        min-height: 70vh;
      }
    }
  </style>
  <link rel="stylesheet" href="../_shared/classroom-standard.css?v=classroom-standard-2">
  <script src="../../auth-config.js?v=tool-access-guard-2"></script>
  <script src="../_shared/tool-access-guard.js?v=tool-access-guard-2"></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Dynamic Classroom Displays</h1>
        <p>Interactive graph, circle equation, circle theorem, and trigonometric displays for board explanation</p>
      </div>
      <div class="top-actions" id="modeButtons">
        <button class="mode-btn active" type="button" data-mode="graphs">Graph Transformations</button>
        <button class="mode-btn" type="button" data-mode="circleEq">Circle Equation</button>
        <button class="mode-btn" type="button" data-mode="circles">Circle Theorems</button>
        <button class="mode-btn" type="button" data-mode="trig">Trig Graphs</button>
        <button class="action-btn" type="button" id="resetBtn">Reset</button>
        <button class="action-btn" type="button" id="fullscreenBtn">Full Screen</button>
      </div>
    </header>

    <section class="workspace">
      <aside class="panel">
        <section class="panel-section">
          <h2>Dynamic Model</h2>
          <select id="modelSelect" aria-label="Dynamic model"></select>
          <p class="panel-note" id="modelNote"></p>
        </section>
        <section class="panel-section" id="controlPanel">
          <h2>Controls</h2>
        </section>
      </aside>

      <section class="board-shell">
        <div class="board" id="board">
          <header class="board-header">
            <h2 class="board-title" id="boardTitle">Graph Transformations</h2>
            <div class="board-equation" id="boardEquation">y = f(x)</div>
          </header>
          <div class="stage" id="stage"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const board = document.getElementById("board");
    const modelSelect = document.getElementById("modelSelect");
    const modelNote = document.getElementById("modelNote");
    const boardTitle = document.getElementById("boardTitle");
    const boardEquation = document.getElementById("boardEquation");
    const controlPanel = document.getElementById("controlPanel");
    const modeButtons = document.getElementById("modeButtons");

    const state = {
      mode: "graphs",
      graphs: {
        model: "quadratic",
        a: 1,
        b: 1,
        h: 0,
        k: 0,
        original: true,
        points: true
      },
      circleEq: {
        model: "equation",
        h: 2,
        k: -1,
        r: 4
      },
      circles: {
        model: "centre-circumference",
        centreA: 305,
        centreB: 55,
        centreP: 180,
        sameA: 235,
        sameB: 125,
        sameP: 265,
        sameQ: 95,
        quadA: 35,
        quadB: 140,
        quadC: 220,
        quadD: 315,
        tangentT: 45
      },
      trig: {
        model: "sine",
        a: 1,
        b: 1,
        h: 0,
        k: 0,
        original: true
      }
    };

    const models = {
      graphs: [
        ["quadratic", "Quadratic Graph", "Use sliders to show stretch, reflection, translation, and horizontal scale."],
        ["cubic", "Cubic Graph", "Compare the original cubic with the transformed curve."],
        ["absolute", "Modulus Graph", "Useful for translations, reflections, and stretch conversations."],
        ["reciprocal", "Reciprocal Graph", "Show how transformations affect asymptotes and branches."]
      ],
      circleEq: [
        ["equation", "Equation of a Circle", "Move the centre or radius to show how the equation changes."]
      ],
      circles: [
        ["centre-circumference", "Angle at Centre", "The angle at the centre is twice the angle at the circumference standing on the same arc."],
        ["same-segment", "Angles in Same Segment", "Angles standing on the same chord are equal."],
        ["cyclic-quadrilateral", "Cyclic Quadrilateral", "Opposite angles in a cyclic quadrilateral add to 180 degrees."],
        ["tangent-radius", "Tangent and Radius", "A tangent is perpendicular to the radius at the point of contact."]
      ],
      trig: [
        ["sine", "Sine Graph", "Use amplitude, horizontal scale, phase shift, and vertical shift."],
        ["cosine", "Cosine Graph", "Compare cosine with a transformed graph."],
        ["tangent", "Tangent Graph", "Show period, vertical shift, and asymptotes."]
      ]
    };

    const graphWidth = 1000;
    const graphHeight = 650;
    const graphBounds = { xmin: -10, xmax: 10, ymin: -8, ymax: 8 };
    const circleEqBounds = { xmin: -10, xmax: 10, ymin: -6.5, ymax: 6.5 };
    const trigBounds = { xmin: 0, xmax: 360, ymin: -4, ymax: 4 };
    const circle = { cx: 500, cy: 330, r: 215 };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function round(value, places = 1) {
      return Number(value).toFixed(places).replace(/\.?0+$/, "");
    }

    function svg(content, viewBox = "0 0 1000 650") {
      stage.innerHTML = '<svg viewBox="' + viewBox + '" preserveAspectRatio="xMidYMid meet" aria-hidden="true">' + content + "</svg>";
    }

    function point(angleDeg, radius = circle.r, cx = circle.cx, cy = circle.cy) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(angle),
        y: cy + radius * Math.sin(angle)
      };
    }

    function distPoint(p, dx, dy) {
      return { x: p.x + dx, y: p.y + dy };
    }

    function line(a, b, cls = "theorem-line") {
      return '<line class="' + cls + '" x1="' + a.x.toFixed(1) + '" y1="' + a.y.toFixed(1) + '" x2="' + b.x.toFixed(1) + '" y2="' + b.y.toFixed(1) + '"/>';
    }

    function dot(p, text, dx = 18, dy = -14) {
      return dotWithDrag(p, text, null, dx, dy);
    }

    function dotWithDrag(p, text, dragId, dx = 18, dy = -14) {
      const pointMarkup = dragId
        ? '<g class="drag-point" data-drag="' + dragId + '"><circle class="drag-target" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="24"/><circle class="drag-ring" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="12"/><circle class="point-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="6"/></g>'
        : '<circle class="point-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="7"/>';
      return pointMarkup + '<text class="label-text" x="' + (p.x + dx).toFixed(1) + '" y="' + (p.y + dy).toFixed(1) + '">' + text + '</text>';
    }

    function angleBetween(a, v, b) {
      const va = { x: a.x - v.x, y: a.y - v.y };
      const vb = { x: b.x - v.x, y: b.y - v.y };
      const dotProduct = va.x * vb.x + va.y * vb.y;
      const crossProduct = va.x * vb.y - va.y * vb.x;
      return Math.abs(Math.atan2(crossProduct, dotProduct) * 180 / Math.PI);
    }

    function angleLabelPoint(a, v, b, radius = 48) {
      const va = { x: a.x - v.x, y: a.y - v.y };
      const vb = { x: b.x - v.x, y: b.y - v.y };
      const la = Math.hypot(va.x, va.y) || 1;
      const lb = Math.hypot(vb.x, vb.y) || 1;
      let ux = va.x / la + vb.x / lb;
      let uy = va.y / la + vb.y / lb;
      const length = Math.hypot(ux, uy);
      if (length < 0.08) {
        ux = -va.y / la;
        uy = va.x / la;
      } else {
        ux /= length;
        uy /= length;
      }
      return { x: v.x + ux * radius, y: v.y + uy * radius };
    }

    function normalizeAngle(value) {
      return ((value % 360) + 360) % 360;
    }

    function graphX(x, bounds = graphBounds) {
      return (x - bounds.xmin) / (bounds.xmax - bounds.xmin) * graphWidth;
    }

    function graphY(y, bounds = graphBounds) {
      return graphHeight - (y - bounds.ymin) / (bounds.ymax - bounds.ymin) * graphHeight;
    }

    function graphGrid(bounds = graphBounds, stepX = 1, stepY = 1) {
      let content = '<rect width="' + graphWidth + '" height="' + graphHeight + '" fill="white"/>';
      for (let x = Math.ceil(bounds.xmin); x <= bounds.xmax; x += stepX) {
        const px = graphX(x, bounds);
        const cls = x === 0 ? "axis" : (x % 5 === 0 ? "grid-major" : "grid-line");
        content += '<line class="' + cls + '" x1="' + px + '" y1="0" x2="' + px + '" y2="' + graphHeight + '"/>';
      }
      for (let y = Math.ceil(bounds.ymin); y <= bounds.ymax; y += stepY) {
        const py = graphY(y, bounds);
        const cls = y === 0 ? "axis" : (y % 5 === 0 ? "grid-major" : "grid-line");
        content += '<line class="' + cls + '" x1="0" y1="' + py + '" x2="' + graphWidth + '" y2="' + py + '"/>';
      }
      content += '<text class="label-text" x="974" y="' + (graphY(0, bounds) - 12) + '">x</text>';
      content += '<text class="label-text" x="' + (graphX(0, bounds) + 12) + '" y="28">y</text>';
      return content;
    }

    function baseFunction(name, x) {
      if (name === "quadratic") return x * x;
      if (name === "cubic") return x * x * x / 8;
      if (name === "absolute") return Math.abs(x);
      if (name === "reciprocal") return x === 0 ? NaN : 1 / x;
      return x * x;
    }

    function functionLabel(name) {
      if (name === "quadratic") return "x<sup>2</sup>";
      if (name === "cubic") return "x<sup>3</sup>";
      if (name === "absolute") return "|x|";
      if (name === "reciprocal") return '<span class="inline-frac"><span>1</span><span>x</span></span>';
      return "f(x)";
    }

    function pathForFunction(fn, bounds, samples = 500) {
      const pieces = [];
      let current = [];
      for (let i = 0; i <= samples; i++) {
        const x = bounds.xmin + (bounds.xmax - bounds.xmin) * i / samples;
        const y = fn(x);
        if (!Number.isFinite(y) || y < bounds.ymin - 20 || y > bounds.ymax + 20) {
          if (current.length) pieces.push(current);
          current = [];
          continue;
        }
        current.push([graphX(x, bounds), graphY(clamp(y, bounds.ymin - 1, bounds.ymax + 1), bounds)]);
      }
      if (current.length) pieces.push(current);
      return pieces.map((part) => part.map((p, index) => (index ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ")).join(" ");
    }

    function slider(id, label, min, max, step, value) {
      return '<div class="control-row"><label for="' + id + '">' + label + '<span id="' + id + 'Value">' + value + '</span></label><input id="' + id + '" type="range" min="' + min + '" max="' + max + '" step="' + step + '" value="' + value + '"></div>';
    }

    function checkbox(id, label, checked) {
      return '<label class="toggle-row"><input id="' + id + '" type="checkbox"' + (checked ? " checked" : "") + '> ' + label + '</label>';
    }

    function attachSlider(id, target, key, renderer) {
      const input = document.getElementById(id);
      const output = document.getElementById(id + "Value");
      input.addEventListener("input", () => {
        state[target][key] = Number(input.value);
        output.textContent = input.value;
        renderer();
      });
    }

    function attachCheckbox(id, target, key, renderer) {
      document.getElementById(id).addEventListener("change", (event) => {
        state[target][key] = event.target.checked;
        renderer();
      });
    }

    function signedHtml(value, places = 1) {
      const n = Number(value);
      if (Math.abs(n) < 1e-9) return "";
      return n > 0 ? " + " + round(n, places) : " - " + round(Math.abs(n), places);
    }

    function scalarPrefix(value, places = 1) {
      const n = Number(value);
      if (Math.abs(n - 1) < 1e-9) return "";
      if (Math.abs(n + 1) < 1e-9) return "-";
      return round(n, places);
    }

    function formatLinearInput(scale, shift, degreeMode = false) {
      const variable = "x";
      const shiftText = Number(shift) === 0
        ? variable
        : variable + (shift > 0 ? " - " + round(shift, 1) : " + " + round(Math.abs(shift), 1)) + (degreeMode ? "&deg;" : "");
      if (Math.abs(scale - 1) < 1e-9) return shiftText;
      if (Math.abs(scale + 1) < 1e-9) return "-" + (shiftText === variable ? variable : "(" + shiftText + ")");
      return round(scale, 1) + (shiftText === variable ? variable : "(" + shiftText + ")");
    }

    function formatFunctionEquation(g) {
      const input = formatLinearInput(g.b, g.h, false);
      let expression;
      if (Math.abs(g.a) < 1e-9) {
        expression = "0";
      } else {
        expression = scalarPrefix(g.a) + "f(" + input + ")";
      }
      expression += signedHtml(g.k);
      return "y = " + expression + ", where f(x) = " + functionLabel(g.model);
    }

    function trigShortName(name) {
      if (name === "sine") return "sin";
      if (name === "cosine") return "cos";
      return "tan";
    }

    function formatTrigEquation(t) {
      const input = formatLinearInput(t.b, t.h, true);
      const functionPart = trigShortName(t.model) + (input === "x" ? " x" : "(" + input + ")");
      let expression;
      if (Math.abs(t.a) < 1e-9) {
        expression = "0";
      } else {
        expression = scalarPrefix(t.a) + functionPart;
      }
      expression += signedHtml(t.k);
      return "y = " + expression;
    }

    function squaredTerm(variable, shift) {
      const n = Number(shift);
      if (Math.abs(n) < 1e-9) return variable + "<sup>2</sup>";
      return "(" + variable + (n > 0 ? " - " + round(n, 1) : " + " + round(Math.abs(n), 1)) + ")<sup>2</sup>";
    }

    function circleEquationHtml(h, k, r) {
      return squaredTerm("x", h) + " + " + squaredTerm("y", k) + " = " + round(r * r, 2);
    }

    function renderGraphControls() {
      const g = state.graphs;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        slider("graphA", "Vertical scale a", -3, 3, 0.5, g.a) +
        slider("graphB", "Horizontal scale b", 0.5, 3, 0.5, g.b) +
        slider("graphH", "Horizontal shift h", -5, 5, 1, g.h) +
        slider("graphK", "Vertical shift k", -5, 5, 1, g.k) +
        checkbox("graphOriginal", "Show original graph", g.original) +
        checkbox("graphPoints", "Show key reference points", g.points);
      attachSlider("graphA", "graphs", "a", render);
      attachSlider("graphB", "graphs", "b", render);
      attachSlider("graphH", "graphs", "h", render);
      attachSlider("graphK", "graphs", "k", render);
      attachCheckbox("graphOriginal", "graphs", "original", render);
      attachCheckbox("graphPoints", "graphs", "points", render);
    }

    function renderGraphDisplay() {
      const g = state.graphs;
      const name = g.model;
      const base = (x) => baseFunction(name, x);
      const transformed = (x) => g.a * base(g.b * (x - g.h)) + g.k;
      let content = graphGrid(graphBounds, 1, 1);
      if (g.original) {
        content += '<path class="base-curve" d="' + pathForFunction(base, graphBounds) + '"/>';
      }
      content += '<path class="main-curve" d="' + pathForFunction(transformed, graphBounds) + '"/>';
      if (g.points && name !== "reciprocal") {
        const points = [-2, -1, 0, 1, 2].map((x) => ({ x, y: transformed(x) })).filter((p) => p.y >= graphBounds.ymin && p.y <= graphBounds.ymax);
        content += points.map((p) => '<circle cx="' + graphX(p.x) + '" cy="' + graphY(p.y) + '" r="5" fill="#f97316"/>').join("");
      }
      boardTitle.textContent = models.graphs.find((item) => item[0] === name)[1];
      boardEquation.innerHTML = formatFunctionEquation(g);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function renderCircleEquationControls() {
      const c = state.circleEq;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        slider("circleEqH", "Centre h", -6, 6, 0.5, c.h) +
        slider("circleEqK", "Centre k", -4, 4, 0.5, c.k) +
        slider("circleEqR", "Radius r", 1, 6, 0.5, c.r);
      attachSlider("circleEqH", "circleEq", "h", render);
      attachSlider("circleEqK", "circleEq", "k", render);
      attachSlider("circleEqR", "circleEq", "r", render);
    }

    function renderCircleEquationDisplay() {
      const c = state.circleEq;
      const centre = { x: graphX(c.h, circleEqBounds), y: graphY(c.k, circleEqBounds) };
      const radiusPoint = { x: graphX(c.h + c.r, circleEqBounds), y: graphY(c.k, circleEqBounds) };
      const pixelRadius = Math.abs(graphX(c.h + c.r, circleEqBounds) - graphX(c.h, circleEqBounds));
      let content = graphGrid(circleEqBounds, 1, 1);
      content += '<circle class="circle-line circle-equation-line" cx="' + centre.x.toFixed(1) + '" cy="' + centre.y.toFixed(1) + '" r="' + pixelRadius.toFixed(1) + '"/>';
      content += line(centre, radiusPoint, "highlight-line");
      content += dotWithDrag(centre, "C", "circleEqCenter", 18, -16);
      content += dotWithDrag(radiusPoint, "R", "circleEqRadius", 16, -14);
      content += '<text class="math-label" x="' + (centre.x + pixelRadius / 2 - 8).toFixed(1) + '" y="' + (centre.y - 14).toFixed(1) + '">r = ' + round(c.r, 1) + '</text>';
      boardTitle.textContent = "Equation of a Circle";
      boardEquation.innerHTML = circleEquationHtml(c.h, c.k, c.r);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function circleBase() {
      return '<rect width="1000" height="650" fill="white"/>' +
        '<circle class="circle-line" cx="' + circle.cx + '" cy="' + circle.cy + '" r="' + circle.r + '"/>' +
        '<circle class="point-dot" cx="' + circle.cx + '" cy="' + circle.cy + '" r="6"/>' +
        '<text class="label-text" x="' + (circle.cx + 12) + '" y="' + (circle.cy - 12) + '">O</text>';
    }

    function arcPath(startDeg, endDeg, radius = 44, cx = circle.cx, cy = circle.cy) {
      const start = point(startDeg, radius, cx, cy);
      const end = point(endDeg, radius, cx, cy);
      const diff = (endDeg - startDeg + 360) % 360;
      const large = diff > 180 ? 1 : 0;
      return 'M ' + start.x.toFixed(1) + ' ' + start.y.toFixed(1) + ' A ' + radius + ' ' + radius + ' 0 ' + large + ' 1 ' + end.x.toFixed(1) + ' ' + end.y.toFixed(1);
    }

    function minorArcPath(startDeg, endDeg, radius = 44, cx = circle.cx, cy = circle.cy) {
      const diff = normalizeAngle(endDeg - startDeg);
      return diff > 180 ? arcPath(endDeg, startDeg, radius, cx, cy) : arcPath(startDeg, endDeg, radius, cx, cy);
    }

    function renderCircleControls() {
      const c = state.circles;
      let controls = '<h2>Controls</h2>';
      if (c.model === "centre-circumference") {
        controls += slider("centreA", "Point A", 0, 360, 1, c.centreA) +
          slider("centreB", "Point B", 0, 360, 1, c.centreB) +
          slider("centreP", "Point P", 0, 360, 1, c.centreP);
      } else if (c.model === "same-segment") {
        controls += slider("sameA", "Point A", 0, 360, 1, c.sameA) +
          slider("sameB", "Point B", 0, 360, 1, c.sameB) +
          slider("sameP", "Point P", 0, 360, 1, c.sameP) +
          slider("sameQ", "Point Q", 0, 360, 1, c.sameQ);
      } else if (c.model === "cyclic-quadrilateral") {
        controls += slider("quadA", "Point A", 0, 360, 1, c.quadA) +
          slider("quadB", "Point B", 0, 360, 1, c.quadB) +
          slider("quadC", "Point C", 0, 360, 1, c.quadC) +
          slider("quadD", "Point D", 0, 360, 1, c.quadD);
      } else {
        controls += slider("tangentT", "Point of contact", 0, 360, 1, c.tangentT);
      }
      controlPanel.innerHTML = controls;
      ["centreA", "centreB", "centreP", "sameA", "sameB", "sameP", "sameQ", "quadA", "quadB", "quadC", "quadD", "tangentT"].forEach((id) => {
        if (document.getElementById(id)) attachSlider(id, "circles", id, render);
      });
    }

    function renderCentreCircumference() {
      const c = state.circles;
      const A = point(c.centreA);
      const B = point(c.centreB);
      const P = point(c.centreP);
      const O = { x: circle.cx, y: circle.cy };
      const centreAngle = angleBetween(A, O, B);
      const circAngle = angleBetween(A, P, B);
      const centreLabel = angleLabelPoint(A, O, B, 82);
      const pointLabel = angleLabelPoint(A, P, B, 58);
      boardTitle.textContent = "Angle at the Centre";
      boardEquation.innerHTML = "Centre angle = 2 &times; circumference angle";
      svg(circleBase() +
        line(O, A, "highlight-line") +
        line(O, B, "highlight-line") +
        line(P, A) + line(P, B) +
        '<path class="angle-mark" d="' + minorArcPath(c.centreA, c.centreB, 62) + '"/>' +
        dotWithDrag(A, "A", "centreA") + dotWithDrag(B, "B", "centreB") + dotWithDrag(P, "P", "centreP", 18, 24) +
        '<text class="math-label" x="' + centreLabel.x.toFixed(1) + '" y="' + centreLabel.y.toFixed(1) + '">' + round(centreAngle) + '&#176;</text>' +
        '<text class="math-label" x="' + pointLabel.x.toFixed(1) + '" y="' + pointLabel.y.toFixed(1) + '">' + round(circAngle) + '&#176;</text>');
    }

    function renderSameSegment() {
      const c = state.circles;
      const A = point(c.sameA);
      const B = point(c.sameB);
      const P = point(c.sameP);
      const Q = point(c.sameQ);
      const angleP = angleBetween(A, P, B);
      const angleQ = angleBetween(A, Q, B);
      const labelP = angleLabelPoint(A, P, B, 58);
      const labelQ = angleLabelPoint(A, Q, B, 58);
      boardTitle.textContent = "Angles in the Same Segment";
      boardEquation.innerHTML = "Angles standing on the same chord are equal";
      svg(circleBase() +
        line(A, B, "highlight-line") +
        line(P, A) + line(P, B) + line(Q, A) + line(Q, B) +
        dotWithDrag(A, "A", "sameA", -30, 18) + dotWithDrag(B, "B", "sameB", 18, 18) + dotWithDrag(P, "P", "sameP") + dotWithDrag(Q, "Q", "sameQ") +
        '<text class="math-label" x="' + labelP.x.toFixed(1) + '" y="' + labelP.y.toFixed(1) + '">' + round(angleP) + '&#176;</text>' +
        '<text class="math-label" x="' + labelQ.x.toFixed(1) + '" y="' + labelQ.y.toFixed(1) + '">' + round(angleQ) + '&#176;</text>');
    }

    function renderCyclicQuadrilateral() {
      const c = state.circles;
      const A = point(c.quadA);
      const B = point(c.quadB);
      const C = point(c.quadC);
      const D = point(c.quadD);
      const angleB = angleBetween(A, B, C);
      const angleD = angleBetween(C, D, A);
      const labelB = angleLabelPoint(A, B, C, 56);
      const labelD = angleLabelPoint(C, D, A, 56);
      boardTitle.textContent = "Cyclic Quadrilateral";
      boardEquation.innerHTML = "Opposite angles add to 180&#176;";
      svg(circleBase() +
        '<path class="theorem-line" d="M ' + A.x + ' ' + A.y + ' L ' + B.x + ' ' + B.y + ' L ' + C.x + ' ' + C.y + ' L ' + D.x + ' ' + D.y + ' Z"/>' +
        dotWithDrag(A, "A", "quadA") + dotWithDrag(B, "B", "quadB", -34, -14) + dotWithDrag(C, "C", "quadC", -34, 22) + dotWithDrag(D, "D", "quadD", 18, 24) +
        '<text class="math-label" x="' + labelB.x.toFixed(1) + '" y="' + labelB.y.toFixed(1) + '">' + round(angleB) + '&#176;</text>' +
        '<text class="math-label" x="' + labelD.x.toFixed(1) + '" y="' + labelD.y.toFixed(1) + '">' + round(angleD) + '&#176;</text>' +
        '<text class="math-label" x="365" y="610">' + round(angleB) + '&#176; + ' + round(angleD) + '&#176; = 180&#176;</text>');
    }

    function renderTangentRadius() {
      const T = point(state.circles.tangentT);
      const O = { x: circle.cx, y: circle.cy };
      const vx = T.x - O.x;
      const vy = T.y - O.y;
      const length = Math.hypot(vx, vy);
      const tx = -vy / length;
      const ty = vx / length;
      const L = { x: T.x - tx * 245, y: T.y - ty * 245 };
      const R = { x: T.x + tx * 245, y: T.y + ty * 245 };
      const label = angleLabelPoint(O, T, R, 54);
      boardTitle.textContent = "Tangent and Radius";
      boardEquation.innerHTML = "Radius &#8869; tangent";
      svg(circleBase() +
        line(O, T, "highlight-line") +
        line(L, R, "theorem-line") +
        dotWithDrag(T, "T", "tangentT") +
        '<text class="math-label" x="' + label.x.toFixed(1) + '" y="' + label.y.toFixed(1) + '">90&#176;</text>');
    }

    function renderCircleDisplay() {
      const model = state.circles.model;
      if (model === "centre-circumference") renderCentreCircumference();
      if (model === "same-segment") renderSameSegment();
      if (model === "cyclic-quadrilateral") renderCyclicQuadrilateral();
      if (model === "tangent-radius") renderTangentRadius();
    }

    function trigValue(name, xDeg) {
      const t = xDeg * Math.PI / 180;
      if (name === "sine") return Math.sin(t);
      if (name === "cosine") return Math.cos(t);
      return Math.tan(t);
    }

    function renderTrigControls() {
      const t = state.trig;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        slider("trigA", "Amplitude / scale a", -3, 3, 0.5, t.a) +
        slider("trigB", "Horizontal scale b", 0.5, 3, 0.5, t.b) +
        slider("trigH", "Phase shift h", -180, 180, 15, t.h) +
        slider("trigK", "Vertical shift k", -3, 3, 0.5, t.k) +
        checkbox("trigOriginal", "Show original graph", t.original);
      attachSlider("trigA", "trig", "a", render);
      attachSlider("trigB", "trig", "b", render);
      attachSlider("trigH", "trig", "h", render);
      attachSlider("trigK", "trig", "k", render);
      attachCheckbox("trigOriginal", "trig", "original", render);
    }

    function trigPath(fn, bounds = trigBounds, samples = 720) {
      const pieces = [];
      let current = [];
      for (let i = 0; i <= samples; i++) {
        const x = bounds.xmin + (bounds.xmax - bounds.xmin) * i / samples;
        const y = fn(x);
        if (!Number.isFinite(y) || Math.abs(y) > 25) {
          if (current.length) pieces.push(current);
          current = [];
          continue;
        }
        current.push([graphX(x, bounds), graphY(clamp(y, bounds.ymin - 0.2, bounds.ymax + 0.2), bounds)]);
      }
      if (current.length) pieces.push(current);
      return pieces.map((part) => part.map((p, index) => (index ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ")).join(" ");
    }

    function renderTrigDisplay() {
      const t = state.trig;
      let content = graphGrid(trigBounds, 30, 1);
      if (t.model === "tangent") {
        for (let n = -3; n <= 5; n++) {
          const x = t.h + (90 + 180 * n) / t.b;
          if (x < trigBounds.xmin || x > trigBounds.xmax) continue;
          content += '<line x1="' + graphX(x, trigBounds) + '" y1="0" x2="' + graphX(x, trigBounds) + '" y2="' + graphHeight + '" stroke="#f97316" stroke-width="2" stroke-dasharray="8 7"/>';
        }
      }
      if (t.original) content += '<path class="base-curve" d="' + trigPath((x) => trigValue(t.model, x), trigBounds) + '"/>';
      const transformed = (x) => t.a * trigValue(t.model, t.b * (x - t.h)) + t.k;
      content += '<path class="secondary-curve" d="' + trigPath(transformed, trigBounds) + '"/>';
      boardTitle.textContent = models.trig.find((item) => item[0] === t.model)[1];
      boardEquation.innerHTML = formatTrigEquation(t);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function currentModeState() {
      return state[state.mode];
    }

    function populateModelSelect() {
      const options = models[state.mode];
      modelSelect.innerHTML = options.map((item) => '<option value="' + item[0] + '">' + item[1] + '</option>').join("");
      modelSelect.value = currentModeState().model;
      modelNote.textContent = options.find((item) => item[0] === modelSelect.value)[2];
    }

    function renderControls() {
      if (state.mode === "graphs") renderGraphControls();
      if (state.mode === "circleEq") renderCircleEquationControls();
      if (state.mode === "circles") renderCircleControls();
      if (state.mode === "trig") renderTrigControls();
    }

    function renderDisplay() {
      if (state.mode === "graphs") renderGraphDisplay();
      if (state.mode === "circleEq") renderCircleEquationDisplay();
      if (state.mode === "circles") renderCircleDisplay();
      if (state.mode === "trig") renderTrigDisplay();
    }

    let activeDrag = null;

    function svgPointFromPointer(svgEl, event) {
      const rect = svgEl.getBoundingClientRect();
      const box = svgEl.viewBox && svgEl.viewBox.baseVal ? svgEl.viewBox.baseVal : { x: 0, y: 0, width: graphWidth, height: graphHeight };
      return {
        x: box.x + (event.clientX - rect.left) * box.width / (rect.width || 1),
        y: box.y + (event.clientY - rect.top) * box.height / (rect.height || 1)
      };
    }

    function angleFromPointer(svgEl, event) {
      const p = svgPointFromPointer(svgEl, event);
      return normalizeAngle(Math.atan2(p.y - circle.cy, p.x - circle.cx) * 180 / Math.PI + 90);
    }

    function graphCoordsFromPointer(svgEl, event, bounds) {
      const p = svgPointFromPointer(svgEl, event);
      return {
        x: bounds.xmin + p.x / graphWidth * (bounds.xmax - bounds.xmin),
        y: bounds.ymax - p.y / graphHeight * (bounds.ymax - bounds.ymin)
      };
    }

    function snapHalf(value) {
      return Math.round(value * 2) / 2;
    }

    function bindStageDrag() {
      const svgEl = stage.querySelector ? stage.querySelector("svg") : null;
      if (!svgEl || !svgEl.querySelectorAll) return;
      svgEl.querySelectorAll("[data-drag]").forEach((element) => {
        element.addEventListener("pointerdown", (event) => {
          activeDrag = element.dataset.drag;
          element.setPointerCapture?.(event.pointerId);
          event.preventDefault();
        });
      });
    }

    function handleDragMove(event) {
      if (!activeDrag || !stage.querySelector) return;
      const svgEl = stage.querySelector("svg");
      if (!svgEl) return;
      event.preventDefault();
      if (state.mode === "circles" && Object.prototype.hasOwnProperty.call(state.circles, activeDrag)) {
        state.circles[activeDrag] = Math.round(angleFromPointer(svgEl, event));
        render();
      }
      if (state.mode === "circleEq") {
        const p = graphCoordsFromPointer(svgEl, event, circleEqBounds);
        if (activeDrag === "circleEqCenter") {
          state.circleEq.h = snapHalf(clamp(p.x, -6, 6));
          state.circleEq.k = snapHalf(clamp(p.y, -4, 4));
          render();
        }
        if (activeDrag === "circleEqRadius") {
          const radius = Math.hypot(p.x - state.circleEq.h, p.y - state.circleEq.k);
          state.circleEq.r = snapHalf(clamp(radius, 1, 6));
          render();
        }
      }
    }

    function render() {
      populateModelSelect();
      renderControls();
      renderDisplay();
      bindStageDrag();
    }

    function resetCurrent() {
      if (state.mode === "graphs") {
        state.graphs = { model: state.graphs.model, a: 1, b: 1, h: 0, k: 0, original: true, points: true };
      }
      if (state.mode === "circleEq") {
        state.circleEq = { model: state.circleEq.model, h: 2, k: -1, r: 4 };
      }
      if (state.mode === "circles") {
        state.circles = {
          model: state.circles.model,
          centreA: 305,
          centreB: 55,
          centreP: 180,
          sameA: 235,
          sameB: 125,
          sameP: 265,
          sameQ: 95,
          quadA: 35,
          quadB: 140,
          quadC: 220,
          quadD: 315,
          tangentT: 45
        };
      }
      if (state.mode === "trig") {
        state.trig = { model: state.trig.model, a: 1, b: 1, h: 0, k: 0, original: true };
      }
      render();
    }

    modeButtons.addEventListener("click", (event) => {
      const button = event.target.closest("[data-mode]");
      if (!button) return;
      state.mode = button.dataset.mode;
      modeButtons.querySelectorAll("[data-mode]").forEach((btn) => btn.classList.toggle("active", btn === button));
      render();
    });

    modelSelect.addEventListener("change", () => {
      currentModeState().model = modelSelect.value;
      render();
    });

    window.addEventListener("pointermove", handleDragMove);
    window.addEventListener("pointerup", () => { activeDrag = null; });
    window.addEventListener("pointercancel", () => { activeDrag = null; });

    document.getElementById("resetBtn").addEventListener("click", resetCurrent);
    document.getElementById("fullscreenBtn").addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await board.requestFullscreen?.();
        board.classList.add("fullscreen");
      } else {
        await document.exitFullscreen?.();
      }
    });
    document.addEventListener("fullscreenchange", () => {
      board.classList.toggle("fullscreen", Boolean(document.fullscreenElement));
      document.getElementById("fullscreenBtn").textContent = document.fullscreenElement ? "Exit Full Screen" : "Full Screen";
    });

    render();
  </script>
  <script src="../_shared/classroom-standard.js?v=classroom-standard-2"></script>
</body>
