<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Classroom Displays | Kaizen Maths</title>
  <style>
    :root {
      --ink: #14263a;
      --muted: #64748b;
      --line: #d8e2ef;
      --paper: #ffffff;
      --soft: #f6fbff;
      --teal: #13aaa7;
      --teal-dark: #087a76;
      --orange: #f97316;
      --purple: #6554c0;
      --blue: #2563eb;
      --green: #16a34a;
      --shadow: 0 16px 42px rgba(20, 38, 58, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef5f8;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background:
        linear-gradient(135deg, rgba(19, 170, 167, 0.10), rgba(249, 115, 22, 0.08)),
        repeating-linear-gradient(135deg, rgba(37, 99, 235, 0.05) 0 1px, transparent 1px 30px),
        #f8fcff;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 76px;
      padding: 12px 16px;
      color: #fff;
      background: linear-gradient(135deg, #122b46, #174d67 58%, #087a76);
      box-shadow: 0 8px 24px rgba(12, 26, 46, 0.18);
      z-index: 5;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.08;
    }

    .brand p {
      margin: 4px 0 0;
      color: #d9f5f4;
      font-size: 0.84rem;
      font-weight: 680;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mode-btn,
    .action-btn {
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 7px;
      color: #fff;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.24);
      font-weight: 850;
    }

    .mode-btn.active {
      color: #10243c;
      background: #ffffff;
      border-color: #ffffff;
    }

    .action-btn {
      background: var(--orange);
      border-color: var(--orange);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 315px minmax(0, 1fr);
    }

    .panel {
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      background: rgba(255, 255, 255, 0.92);
      border-right: 1px solid var(--line);
    }

    .panel-section {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(20, 38, 58, 0.06);
    }

    .panel-section + .panel-section {
      margin-top: 10px;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: var(--teal-dark);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .panel-note {
      margin: 0;
      color: #42526b;
      font-size: 0.84rem;
      line-height: 1.32;
      font-weight: 650;
    }

    .control-row {
      display: grid;
      gap: 5px;
      margin-top: 10px;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #253858;
      font-size: 0.82rem;
      font-weight: 850;
    }

    .control-row span {
      color: var(--teal-dark);
      font-weight: 900;
    }

    select,
    input[type="range"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
    }

    select,
    input[type="number"],
    input[type="text"] {
      min-height: 38px;
      border: 1px solid #bed0df;
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--ink);
      background: #fff;
      font-weight: 800;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .control-button {
      width: 100%;
      min-height: 42px;
      margin-top: 12px;
      border-radius: 7px;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--purple));
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(19, 170, 167, 0.2);
    }

    .control-button.secondary {
      background: #14263a;
    }

    input[type="range"] {
      accent-color: var(--teal);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: #253858;
      font-size: 0.84rem;
      font-weight: 850;
    }

    .board-shell {
      min-height: 0;
      padding: 16px;
      display: grid;
      background: rgba(216, 226, 239, 0.68);
      overflow: hidden;
    }

    .board {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid #bfd0df;
      border-radius: 9px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .board.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 30;
      border: 0;
      border-radius: 0;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 50px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #ffffff, #f2fffe);
    }

    .board-title {
      margin: 0;
      color: #14263a;
      font-size: 1rem;
      font-weight: 950;
    }

    .board-equation {
      color: var(--purple);
      font-family: "Latin Modern Math", "STIX Two Math", "Cambria Math", "Times New Roman", serif;
      font-size: 1.05rem;
      font-weight: 780;
      text-align: right;
    }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 10px;
      overflow: hidden;
    }

    .stage svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .axis {
      stroke: #172f4a;
      stroke-width: 2.3;
    }

    .grid-line {
      stroke: #dbe6f1;
      stroke-width: 1;
    }

    .grid-major {
      stroke: #c5d4e1;
      stroke-width: 1.4;
    }

    .base-curve {
      fill: none;
      stroke: #64748b;
      stroke-width: 3;
      stroke-dasharray: 9 7;
    }

    .main-curve {
      fill: none;
      stroke: var(--teal);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .secondary-curve {
      fill: none;
      stroke: var(--orange);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .target-curve {
      fill: none;
      stroke: var(--purple);
      stroke-width: 3;
      stroke-dasharray: 12 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.62;
    }

    .shape-line {
      fill: none;
      stroke: #14263a;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shape-original {
      fill: rgba(20, 38, 58, 0.10);
      stroke: #14263a;
      stroke-width: 4;
      stroke-linejoin: round;
    }

    .shape-final {
      fill: rgba(100, 84, 192, 0.10);
      stroke: var(--purple);
      stroke-width: 3;
      stroke-dasharray: 11 8;
      stroke-linejoin: round;
    }

    .shape-live {
      fill: rgba(19, 170, 167, 0.20);
      stroke: var(--teal-dark);
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .vector-line {
      stroke: var(--orange);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      marker-end: url(#arrowHead);
    }

    .calculus-area {
      fill: rgba(19, 170, 167, 0.18);
      stroke: rgba(8, 122, 118, 0.55);
      stroke-width: 2;
    }

    .circle-line {
      fill: #fff;
      stroke: #14263a;
      stroke-width: 4;
    }

    .circle-equation-line {
      fill: none;
    }

    .theorem-line {
      fill: none;
      stroke: #14263a;
      stroke-width: 3.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .highlight-line {
      fill: none;
      stroke: var(--teal);
      stroke-width: 4.5;
      stroke-linecap: round;
    }

    .angle-mark {
      fill: none;
      stroke: var(--orange);
      stroke-width: 4;
      stroke-linecap: round;
    }

    .point-dot {
      fill: #14263a;
      stroke: #fff;
      stroke-width: 3;
    }

    .label-text {
      fill: #14263a;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 18px;
      font-weight: 900;
      paint-order: stroke;
      stroke: white;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .math-label {
      fill: var(--purple);
      font-family: "Latin Modern Math", "STIX Two Math", "Cambria Math", "Times New Roman", serif;
      font-size: 22px;
      font-weight: 780;
      paint-order: stroke;
      stroke: white;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .inline-frac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      line-height: 1;
      margin: 0 2px;
    }

    .inline-frac span:first-child {
      border-bottom: 1.8px solid currentColor;
      padding: 0 4px 2px;
    }

    .inline-frac span:last-child {
      padding-top: 2px;
    }

    .inline-vector {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      padding: 0 7px;
      margin: 0 2px;
      border-left: 2px solid currentColor;
      border-right: 2px solid currentColor;
      border-radius: 2px;
      line-height: 1.05;
      vertical-align: middle;
    }

    .drag-point {
      cursor: grab;
      touch-action: none;
    }

    .drag-point:active {
      cursor: grabbing;
    }

    .drag-target {
      fill: transparent;
      pointer-events: all;
    }

    .drag-ring {
      fill: #ffffff;
      stroke: var(--orange);
      stroke-width: 3;
    }

    .label-text,
    .math-label {
      pointer-events: none;
    }

    @media (max-width: 920px) {
      html,
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .panel {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .board-shell {
        min-height: 70vh;
      }
    }
  </style>
  <link rel="stylesheet" href="../_shared/classroom-standard.css?v=classroom-standard-2">

</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Dynamic Classroom Displays</h1>
        <p>Interactive graph, transformation, circle, complex number, and calculus displays for board explanation</p>
      </div>
      <div class="top-actions" id="modeButtons">
        <button class="mode-btn active" type="button" data-mode="graphs">Graphs</button>
        <button class="mode-btn" type="button" data-mode="transforms">Transforms</button>
        <button class="mode-btn" type="button" data-mode="circleEq">Circle Equation</button>
        <button class="mode-btn" type="button" data-mode="circles">Circle Theorems</button>
        <button class="mode-btn" type="button" data-mode="trig">Trig</button>
        <button class="mode-btn" type="button" data-mode="complex">Complex</button>
        <button class="mode-btn" type="button" data-mode="calculus">Calculus</button>
        <button class="action-btn" type="button" id="resetBtn">Reset</button>
        <button class="action-btn" type="button" id="fullscreenBtn">Full Screen</button>
      </div>
    </header>

    <section class="workspace">
      <aside class="panel">
        <section class="panel-section">
          <h2>Dynamic Model</h2>
          <select id="modelSelect" aria-label="Dynamic model"></select>
          <p class="panel-note" id="modelNote"></p>
        </section>
        <section class="panel-section" id="controlPanel">
          <h2>Controls</h2>
        </section>
      </aside>

      <section class="board-shell">
        <div class="board" id="board">
          <header class="board-header">
            <h2 class="board-title" id="boardTitle">Graph Transformations</h2>
            <div class="board-equation" id="boardEquation">y = f(x)</div>
          </header>
          <div class="stage" id="stage"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const board = document.getElementById("board");
    const modelSelect = document.getElementById("modelSelect");
    const modelNote = document.getElementById("modelNote");
    const boardTitle = document.getElementById("boardTitle");
    const boardEquation = document.getElementById("boardEquation");
    const controlPanel = document.getElementById("controlPanel");
    const modeButtons = document.getElementById("modeButtons");

    const state = {
      mode: "graphs",
      graphs: {
        model: "quadratic",
        progress: 1,
        a: 1,
        b: 1,
        h: 0,
        k: 0,
        original: true,
        points: true
      },
      transforms: {
        model: "rotation",
        progress: 1,
        centreX: 1,
        centreY: 1,
        angle: 90,
        direction: "anticlockwise",
        vectorX: 4,
        vectorY: 2,
        scale: 2
      },
      circleEq: {
        model: "equation",
        progress: 1,
        h: 2,
        k: -1,
        r: 4
      },
      circles: {
        model: "centre-circumference",
        centreA: 305,
        centreB: 55,
        centreP: 180,
        sameA: 235,
        sameB: 125,
        sameP: 265,
        sameQ: 95,
        quadA: 35,
        quadB: 140,
        quadC: 220,
        quadD: 315,
        tangentT: 45
      },
      trig: {
        model: "sine",
        a: 1,
        b: 1,
        h: 0,
        k: 0,
        original: true
      },
      complex: {
        model: "multiply-cis",
        progress: 1,
        real: 3,
        imag: 1,
        modulus: 1.5,
        angle: 90
      },
      calculus: {
        model: "tangent",
        progress: 1,
        x: 2,
        h: 3,
        rectangles: 6
      }
    };

    const models = {
      graphs: [
        ["quadratic", "Quadratic Graph", "Use sliders to show stretch, reflection, translation, and horizontal scale."],
        ["cubic", "Cubic Graph", "Compare the original cubic with the transformed curve."],
        ["absolute", "Modulus Graph", "Useful for translations, reflections, and stretch conversations."],
        ["reciprocal", "Reciprocal Graph", "Show how transformations affect asymptotes and branches."]
      ],
      transforms: [
        ["rotation", "Rotation", "Set the centre, angle, and direction, then animate the movement."],
        ["translation", "Translation", "Set the translation vector, then animate the object moving to its image."],
        ["enlargement", "Enlargement", "Set the centre and scale factor, then animate the enlargement."]
      ],
      circleEq: [
        ["equation", "Equation of a Circle", "Move the centre or radius to show how the equation changes."]
      ],
      circles: [
        ["centre-circumference", "Angle at Centre", "The angle at the centre is twice the angle at the circumference standing on the same arc."],
        ["same-segment", "Angles in Same Segment", "Angles standing on the same chord are equal."],
        ["cyclic-quadrilateral", "Cyclic Quadrilateral", "Opposite angles in a cyclic quadrilateral add to 180 degrees."],
        ["tangent-radius", "Tangent and Radius", "A tangent is perpendicular to the radius at the point of contact."]
      ],
      trig: [
        ["sine", "Sine Graph", "Use amplitude, horizontal scale, phase shift, and vertical shift."],
        ["cosine", "Cosine Graph", "Compare cosine with a transformed graph."],
        ["tangent", "Tangent Graph", "Show period, vertical shift, and asymptotes."]
      ],
      complex: [
        ["multiply-cis", "Multiplication by r cis θ", "Animate multiplication as a stretch and rotation on the Argand diagram."]
      ],
      calculus: [
        ["tangent", "Secant to Tangent", "Animate a secant line moving towards the tangent line at a point."],
        ["area", "Area Under a Curve", "Show rectangular approximations under a curve."]
      ]
    };

    const graphWidth = 1000;
    const graphHeight = 650;
    const graphBounds = { xmin: -10, xmax: 10, ymin: -8, ymax: 8 };
    const circleEqBounds = { xmin: -10, xmax: 10, ymin: -6.5, ymax: 6.5 };
    const transformBounds = { xmin: -8, xmax: 8, ymin: -6, ymax: 6 };
    const complexBounds = { xmin: -8, xmax: 8, ymin: -6, ymax: 6 };
    const calculusBounds = { xmin: -6, xmax: 6, ymin: -4, ymax: 7 };
    const trigBounds = { xmin: 0, xmax: 360, ymin: -4, ymax: 4 };
    const circle = { cx: 500, cy: 330, r: 215 };
    const baseShape = [
      { label: "A", x: -4, y: -1 },
      { label: "B", x: -1, y: -1 },
      { label: "C", x: -3, y: 2 }
    ];
    let activeAnimation = null;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function round(value, places = 1) {
      return Number(value).toFixed(places).replace(/(\.\d*?)0+$/, "$1").replace(/\.$/, "");
    }

    function escapeAttr(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function svg(content, viewBox = "0 0 1000 650") {
      stage.innerHTML = '<svg viewBox="' + viewBox + '" preserveAspectRatio="xMidYMid meet" aria-hidden="true">' + content + "</svg>";
    }

    function markerDefs() {
      return '<defs><marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker></defs>';
    }

    function point(angleDeg, radius = circle.r, cx = circle.cx, cy = circle.cy) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(angle),
        y: cy + radius * Math.sin(angle)
      };
    }

    function distPoint(p, dx, dy) {
      return { x: p.x + dx, y: p.y + dy };
    }

    function line(a, b, cls = "theorem-line") {
      return '<line class="' + cls + '" x1="' + a.x.toFixed(1) + '" y1="' + a.y.toFixed(1) + '" x2="' + b.x.toFixed(1) + '" y2="' + b.y.toFixed(1) + '"/>';
    }

    function dot(p, text, dx = 18, dy = -14) {
      return dotWithDrag(p, text, null, dx, dy);
    }

    function dotWithDrag(p, text, dragId, dx = 18, dy = -14) {
      const pointMarkup = dragId
        ? '<g class="drag-point" data-drag="' + dragId + '"><circle class="drag-target" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="24"/><circle class="drag-ring" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="12"/><circle class="point-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="6"/></g>'
        : '<circle class="point-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="7"/>';
      return pointMarkup + '<text class="label-text" x="' + (p.x + dx).toFixed(1) + '" y="' + (p.y + dy).toFixed(1) + '">' + text + '</text>';
    }

    function angleBetween(a, v, b) {
      const va = { x: a.x - v.x, y: a.y - v.y };
      const vb = { x: b.x - v.x, y: b.y - v.y };
      const dotProduct = va.x * vb.x + va.y * vb.y;
      const crossProduct = va.x * vb.y - va.y * vb.x;
      return Math.abs(Math.atan2(crossProduct, dotProduct) * 180 / Math.PI);
    }

    function angleLabelPoint(a, v, b, radius = 48) {
      const va = { x: a.x - v.x, y: a.y - v.y };
      const vb = { x: b.x - v.x, y: b.y - v.y };
      const la = Math.hypot(va.x, va.y) || 1;
      const lb = Math.hypot(vb.x, vb.y) || 1;
      let ux = va.x / la + vb.x / lb;
      let uy = va.y / la + vb.y / lb;
      const length = Math.hypot(ux, uy);
      if (length < 0.08) {
        ux = -va.y / la;
        uy = va.x / la;
      } else {
        ux /= length;
        uy /= length;
      }
      return { x: v.x + ux * radius, y: v.y + uy * radius };
    }

    function normalizeAngle(value) {
      return ((value % 360) + 360) % 360;
    }

    function graphX(x, bounds = graphBounds) {
      return (x - bounds.xmin) / (bounds.xmax - bounds.xmin) * graphWidth;
    }

    function graphY(y, bounds = graphBounds) {
      return graphHeight - (y - bounds.ymin) / (bounds.ymax - bounds.ymin) * graphHeight;
    }

    function graphGrid(bounds = graphBounds, stepX = 1, stepY = 1) {
      let content = '<rect width="' + graphWidth + '" height="' + graphHeight + '" fill="white"/>';
      for (let x = Math.ceil(bounds.xmin); x <= bounds.xmax; x += stepX) {
        const px = graphX(x, bounds);
        const cls = x === 0 ? "axis" : (x % 5 === 0 ? "grid-major" : "grid-line");
        content += '<line class="' + cls + '" x1="' + px + '" y1="0" x2="' + px + '" y2="' + graphHeight + '"/>';
      }
      for (let y = Math.ceil(bounds.ymin); y <= bounds.ymax; y += stepY) {
        const py = graphY(y, bounds);
        const cls = y === 0 ? "axis" : (y % 5 === 0 ? "grid-major" : "grid-line");
        content += '<line class="' + cls + '" x1="0" y1="' + py + '" x2="' + graphWidth + '" y2="' + py + '"/>';
      }
      content += '<text class="label-text" x="974" y="' + (graphY(0, bounds) - 12) + '">x</text>';
      content += '<text class="label-text" x="' + (graphX(0, bounds) + 12) + '" y="28">y</text>';
      return content;
    }

    function baseFunction(name, x) {
      if (name === "quadratic") return x * x;
      if (name === "cubic") return x * x * x / 8;
      if (name === "absolute") return Math.abs(x);
      if (name === "reciprocal") return x === 0 ? NaN : 1 / x;
      return x * x;
    }

    function functionLabel(name) {
      if (name === "quadratic") return "x<sup>2</sup>";
      if (name === "cubic") return "x<sup>3</sup>";
      if (name === "absolute") return "|x|";
      if (name === "reciprocal") return '<span class="inline-frac"><span>1</span><span>x</span></span>';
      return "f(x)";
    }

    function pathForFunction(fn, bounds, samples = 500) {
      const pieces = [];
      let current = [];
      for (let i = 0; i <= samples; i++) {
        const x = bounds.xmin + (bounds.xmax - bounds.xmin) * i / samples;
        const y = fn(x);
        if (!Number.isFinite(y) || y < bounds.ymin - 20 || y > bounds.ymax + 20) {
          if (current.length) pieces.push(current);
          current = [];
          continue;
        }
        current.push([graphX(x, bounds), graphY(clamp(y, bounds.ymin - 1, bounds.ymax + 1), bounds)]);
      }
      if (current.length) pieces.push(current);
      return pieces.map((part) => part.map((p, index) => (index ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ")).join(" ");
    }

    function slider(id, label, min, max, step, value) {
      return '<div class="control-row"><label for="' + id + '">' + label + '<span id="' + id + 'Value">' + value + '</span></label><input id="' + id + '" type="range" min="' + min + '" max="' + max + '" step="' + step + '" value="' + value + '"></div>';
    }

    function checkbox(id, label, checked) {
      return '<label class="toggle-row"><input id="' + id + '" type="checkbox"' + (checked ? " checked" : "") + '> ' + label + '</label>';
    }

    function numberInput(id, label, value, min, max, step = 1) {
      return '<div class="control-row"><label for="' + id + '">' + label + '</label><input id="' + id + '" type="number" min="' + min + '" max="' + max + '" step="' + step + '" value="' + value + '"></div>';
    }

    function textInput(id, label, value) {
      return '<div class="control-row"><label for="' + id + '">' + label + '</label><input id="' + id + '" type="text" value="' + escapeAttr(value) + '"></div>';
    }

    function selectInput(id, label, value, options) {
      return '<div class="control-row"><label for="' + id + '">' + label + '</label><select id="' + id + '">' +
        options.map((option) => '<option value="' + option[0] + '"' + (String(option[0]) === String(value) ? " selected" : "") + '>' + option[1] + '</option>').join("") +
        '</select></div>';
    }

    function actionButton(id, label, secondary = false) {
      return '<button class="control-button' + (secondary ? " secondary" : "") + '" type="button" id="' + id + '">' + label + '</button>';
    }

    function attachSlider(id, target, key, renderer) {
      const input = document.getElementById(id);
      const output = document.getElementById(id + "Value");
      input.addEventListener("input", () => {
        state[target][key] = Number(input.value);
        if (Object.prototype.hasOwnProperty.call(state[target], "progress")) state[target].progress = 1;
        output.textContent = input.value;
        renderer();
      });
    }

    function attachCheckbox(id, target, key, renderer) {
      document.getElementById(id).addEventListener("change", (event) => {
        state[target][key] = event.target.checked;
        renderer();
      });
    }

    function attachNumberInput(id, target, key, renderer) {
      const input = document.getElementById(id);
      input.addEventListener("input", () => {
        const value = Number(input.value);
        if (Number.isFinite(value)) state[target][key] = value;
        state[target].progress = 1;
        renderer();
      });
    }

    function attachSelectInput(id, target, key, renderer, numeric = false) {
      const input = document.getElementById(id);
      input.addEventListener("change", () => {
        state[target][key] = numeric ? Number(input.value) : input.value;
        state[target].progress = 1;
        renderer();
      });
    }

    function attachAnimationButton(id, target) {
      const button = document.getElementById(id);
      if (!button) return;
      button.addEventListener("click", () => startAnimation(target));
    }

    function signedHtml(value, places = 1) {
      const n = Number(value);
      if (Math.abs(n) < 1e-9) return "";
      return n > 0 ? " + " + round(n, places) : " - " + round(Math.abs(n), places);
    }

    function scalarPrefix(value, places = 1) {
      const n = Number(value);
      if (Math.abs(n - 1) < 1e-9) return "";
      if (Math.abs(n + 1) < 1e-9) return "-";
      return round(n, places);
    }

    function formatLinearInput(scale, shift, degreeMode = false) {
      const variable = "x";
      const shiftText = Number(shift) === 0
        ? variable
        : variable + (shift > 0 ? " - " + round(shift, 1) : " + " + round(Math.abs(shift), 1)) + (degreeMode ? "&deg;" : "");
      if (Math.abs(scale - 1) < 1e-9) return shiftText;
      if (Math.abs(scale + 1) < 1e-9) return "-" + (shiftText === variable ? variable : "(" + shiftText + ")");
      return round(scale, 1) + (shiftText === variable ? variable : "(" + shiftText + ")");
    }

    function formatFunctionEquation(g) {
      const input = formatLinearInput(g.b, g.h, false);
      let expression;
      if (Math.abs(g.a) < 1e-9) {
        expression = "0";
      } else {
        expression = scalarPrefix(g.a) + "f(" + input + ")";
      }
      expression += signedHtml(g.k);
      return "y = " + expression + ", where f(x) = " + functionLabel(g.model);
    }

    function trigShortName(name) {
      if (name === "sine") return "sin";
      if (name === "cosine") return "cos";
      return "tan";
    }

    function formatTrigEquation(t) {
      const input = formatLinearInput(t.b, t.h, true);
      const functionPart = trigShortName(t.model) + (input === "x" ? " x" : "(" + input + ")");
      let expression;
      if (Math.abs(t.a) < 1e-9) {
        expression = "0";
      } else {
        expression = scalarPrefix(t.a) + functionPart;
      }
      expression += signedHtml(t.k);
      return "y = " + expression;
    }

    function squaredTerm(variable, shift) {
      const n = Number(shift);
      if (Math.abs(n) < 1e-9) return variable + "<sup>2</sup>";
      return "(" + variable + (n > 0 ? " - " + round(n, 1) : " + " + round(Math.abs(n), 1)) + ")<sup>2</sup>";
    }

    function circleEquationHtml(h, k, r) {
      return squaredTerm("x", h) + " + " + squaredTerm("y", k) + " = " + round(r * r, 2);
    }

    function coefficientText(value) {
      if (Math.abs(value - 1) < 1e-9) return "";
      if (Math.abs(value + 1) < 1e-9) return "-";
      return round(value, 1);
    }

    function graphPlainEquation(g) {
      const shift = g.h === 0 ? "x" : "x " + (g.h > 0 ? "- " + round(g.h, 1) : "+ " + round(Math.abs(g.h), 1));
      const tail = signedHtml(g.k, 1);
      const coeff = coefficientText(g.a);
      if (g.model === "quadratic") return "y = " + coeff + "(" + shift + ")²" + tail;
      if (g.model === "cubic") return "y = " + coeff + "(" + shift + ")³" + tail;
      if (g.model === "absolute") return "y = " + coeff + "|" + shift + "|" + tail;
      if (g.model === "reciprocal") return "y = " + (Math.abs(g.a - 1) < 1e-9 ? "1" : Math.abs(g.a + 1) < 1e-9 ? "-1" : round(g.a, 1)) + "/(" + shift + ")" + tail;
      return "y = f(x)";
    }

    function parseNumberPrefix(value) {
      if (!value || value === "+") return 1;
      if (value === "-") return -1;
      return Number(value);
    }

    function parseShift(value) {
      if (!value) return 0;
      return -Number(value);
    }

    function normaliseGraphEquation(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/^y=/, "")
        .replace(/−/g, "-")
        .replace(/×/g, "*");
    }

    function parseGraphEquation(value, model) {
      const text = normaliseGraphEquation(value);
      let match;
      if (model === "quadratic") {
        match = text.match(/^([+-]?(?:\d+(?:\.\d+)?)?)\*?\(?x([+-]\d+(?:\.\d+)?)?\)?(?:\^2|²)([+-]\d+(?:\.\d+)?)?$/);
      } else if (model === "cubic") {
        match = text.match(/^([+-]?(?:\d+(?:\.\d+)?)?)\*?\(?x([+-]\d+(?:\.\d+)?)?\)?(?:\^3|³)([+-]\d+(?:\.\d+)?)?$/);
      } else if (model === "absolute") {
        match = text.match(/^([+-]?(?:\d+(?:\.\d+)?)?)\*?(?:\|x([+-]\d+(?:\.\d+)?)?\||abs\(x([+-]\d+(?:\.\d+)?)?\))([+-]\d+(?:\.\d+)?)?$/);
        if (match) match = [match[0], match[1], match[2] || match[3], match[4]];
      } else if (model === "reciprocal") {
        match = text.match(/^([+-]?(?:\d+(?:\.\d+)?)?)\/\(x([+-]\d+(?:\.\d+)?)?\)([+-]\d+(?:\.\d+)?)?$/);
      }
      if (!match) return null;
      const a = parseNumberPrefix(match[1]);
      const h = parseShift(match[2]);
      const k = match[3] ? Number(match[3]) : 0;
      if (![a, h, k].every(Number.isFinite)) return null;
      return { a, b: 1, h, k };
    }

    function pointToSvg(p, bounds) {
      return { x: graphX(p.x, bounds), y: graphY(p.y, bounds) };
    }

    function polygonPath(points, bounds) {
      return points.map((p, index) => {
        const q = pointToSvg(p, bounds);
        return (index ? "L" : "M") + q.x.toFixed(1) + " " + q.y.toFixed(1);
      }).join(" ") + " Z";
    }

    function transformedShape(t, progress = 1) {
      if (t.model === "translation") {
        return baseShape.map((p) => ({
          label: p.label,
          x: p.x + t.vectorX * progress,
          y: p.y + t.vectorY * progress
        }));
      }
      if (t.model === "enlargement") {
        const scale = 1 + (t.scale - 1) * progress;
        return baseShape.map((p) => ({
          label: p.label,
          x: t.centreX + scale * (p.x - t.centreX),
          y: t.centreY + scale * (p.y - t.centreY)
        }));
      }
      const direction = t.direction === "clockwise" ? -1 : 1;
      const theta = direction * t.angle * progress * Math.PI / 180;
      const cos = Math.cos(theta);
      const sin = Math.sin(theta);
      return baseShape.map((p) => {
        const dx = p.x - t.centreX;
        const dy = p.y - t.centreY;
        return {
          label: p.label,
          x: t.centreX + dx * cos - dy * sin,
          y: t.centreY + dx * sin + dy * cos
        };
      });
    }

    function labelShape(points, bounds, prime = "") {
      return points.map((p) => {
        const q = pointToSvg(p, bounds);
        return '<text class="label-text" x="' + (q.x + 10).toFixed(1) + '" y="' + (q.y - 10).toFixed(1) + '">' + p.label + prime + '</text>';
      }).join("");
    }

    function centreMark(x, y, bounds, label = "Centre") {
      const p = pointToSvg({ x, y }, bounds);
      return '<line class="highlight-line" x1="' + (p.x - 12).toFixed(1) + '" y1="' + p.y.toFixed(1) + '" x2="' + (p.x + 12).toFixed(1) + '" y2="' + p.y.toFixed(1) + '"/>' +
        '<line class="highlight-line" x1="' + p.x.toFixed(1) + '" y1="' + (p.y - 12).toFixed(1) + '" x2="' + p.x.toFixed(1) + '" y2="' + (p.y + 12).toFixed(1) + '"/>' +
        '<text class="label-text" x="' + (p.x + 16).toFixed(1) + '" y="' + (p.y - 14).toFixed(1) + '">' + label + '</text>';
    }

    function vectorFromPoints(a, b, bounds, cls = "vector-line") {
      const p = pointToSvg(a, bounds);
      const q = pointToSvg(b, bounds);
      return '<line class="' + cls + '" x1="' + p.x.toFixed(1) + '" y1="' + p.y.toFixed(1) + '" x2="' + q.x.toFixed(1) + '" y2="' + q.y.toFixed(1) + '"/>';
    }

    function coordinatePair(x, y) {
      return "(" + round(x, 1) + ", " + round(y, 1) + ")";
    }

    function vectorColumnHtml(x, y) {
      return '<span class="inline-vector"><span>' + round(x, 1) + '</span><span>' + round(y, 1) + '</span></span>';
    }

    function formatTransformationEquation(t) {
      if (t.model === "translation") return "Translate by vector " + vectorColumnHtml(t.vectorX, t.vectorY);
      if (t.model === "enlargement") return "Enlarge by scale factor " + round(t.scale, 1) + " from " + coordinatePair(t.centreX, t.centreY);
      return "Rotate " + round(t.angle, 0) + "&deg; " + t.direction + " about " + coordinatePair(t.centreX, t.centreY);
    }

    function complexPoint(real, imag) {
      return { x: real, y: imag };
    }

    function complexProduct(c, progress = 1) {
      const scale = 1 + (c.modulus - 1) * progress;
      const theta = c.angle * progress * Math.PI / 180;
      const cos = Math.cos(theta);
      const sin = Math.sin(theta);
      return {
        x: scale * (c.real * cos - c.imag * sin),
        y: scale * (c.real * sin + c.imag * cos)
      };
    }

    function complexText(real, imag) {
      const a = round(real, 1);
      const b = round(Math.abs(imag), 1);
      if (Math.abs(imag) < 1e-9) return a;
      if (Math.abs(real) < 1e-9) return (imag < 0 ? "-" : "") + (b === "1" ? "" : b) + "i";
      return a + (imag < 0 ? " - " : " + ") + (b === "1" ? "" : b) + "i";
    }

    function calculusFunction(x) {
      return 0.25 * x * x - 1;
    }

    function calculusDerivative(x) {
      return 0.5 * x;
    }

    function calculusLabel() {
      return "f(x) = 0.25x<sup>2</sup> - 1";
    }

    function renderGraphControls() {
      const g = state.graphs;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        textInput("graphEquationInput", "Target equation", graphPlainEquation(g)) +
        '<div class="input-grid">' +
        actionButton("graphApplyEquation", "Apply Equation", true) +
        actionButton("graphAnimate", "Animate Graph") +
        '</div>' +
        slider("graphA", "Vertical scale a", -3, 3, 0.5, g.a) +
        slider("graphB", "Horizontal scale b", 0.5, 3, 0.5, g.b) +
        slider("graphH", "Horizontal shift h", -5, 5, 1, g.h) +
        slider("graphK", "Vertical shift k", -5, 5, 1, g.k) +
        checkbox("graphOriginal", "Show original graph", g.original) +
        checkbox("graphPoints", "Show key reference points", g.points);
      attachSlider("graphA", "graphs", "a", render);
      attachSlider("graphB", "graphs", "b", render);
      attachSlider("graphH", "graphs", "h", render);
      attachSlider("graphK", "graphs", "k", render);
      attachCheckbox("graphOriginal", "graphs", "original", render);
      attachCheckbox("graphPoints", "graphs", "points", render);
      document.getElementById("graphApplyEquation").addEventListener("click", () => {
        const parsed = parseGraphEquation(document.getElementById("graphEquationInput").value, state.graphs.model);
        if (!parsed) {
          modelNote.textContent = "Use the matching form for the selected graph, such as y = 2(x - 3)² + 1.";
          return;
        }
        Object.assign(state.graphs, parsed, { progress: 1 });
        render();
      });
      attachAnimationButton("graphAnimate", "graphs");
    }

    function renderGraphDisplay() {
      const g = state.graphs;
      const name = g.model;
      const base = (x) => baseFunction(name, x);
      const live = {
        a: 1 + (g.a - 1) * g.progress,
        b: 1 + (g.b - 1) * g.progress,
        h: g.h * g.progress,
        k: g.k * g.progress
      };
      const transformed = (x) => live.a * base(live.b * (x - live.h)) + live.k;
      const target = (x) => g.a * base(g.b * (x - g.h)) + g.k;
      let content = graphGrid(graphBounds, 1, 1);
      if (g.original) {
        content += '<path class="base-curve" d="' + pathForFunction(base, graphBounds) + '"/>';
      }
      if (g.progress < 0.995) {
        content += '<path class="target-curve" d="' + pathForFunction(target, graphBounds) + '"/>';
      }
      content += '<path class="main-curve" d="' + pathForFunction(transformed, graphBounds) + '"/>';
      if (g.points && name !== "reciprocal") {
        const points = [-2, -1, 0, 1, 2].map((x) => ({ x, y: transformed(x) })).filter((p) => p.y >= graphBounds.ymin && p.y <= graphBounds.ymax);
        content += points.map((p) => '<circle cx="' + graphX(p.x) + '" cy="' + graphY(p.y) + '" r="5" fill="#f97316"/>').join("");
      }
      boardTitle.textContent = models.graphs.find((item) => item[0] === name)[1];
      boardEquation.innerHTML = formatFunctionEquation(g);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function renderTransformControls() {
      const t = state.transforms;
      let controls = '<h2>Controls</h2>';
      if (t.model === "rotation") {
        controls += '<div class="input-grid">' +
          numberInput("transformCentreX", "Centre x", t.centreX, -6, 6, 1) +
          numberInput("transformCentreY", "Centre y", t.centreY, -5, 5, 1) +
          '</div>' +
          selectInput("transformAngle", "Angle", t.angle, [[90, "90°"], [180, "180°"], [270, "270°"]]) +
          selectInput("transformDirection", "Direction", t.direction, [["anticlockwise", "Anticlockwise"], ["clockwise", "Clockwise"]]) +
          actionButton("transformAnimate", "Animate Rotation");
      } else if (t.model === "translation") {
        controls += '<div class="input-grid">' +
          numberInput("transformVectorX", "Vector x", t.vectorX, -8, 8, 1) +
          numberInput("transformVectorY", "Vector y", t.vectorY, -6, 6, 1) +
          '</div>' +
          actionButton("transformAnimate", "Animate Translation");
      } else {
        controls += '<div class="input-grid">' +
          numberInput("transformCentreX", "Centre x", t.centreX, -6, 6, 1) +
          numberInput("transformCentreY", "Centre y", t.centreY, -5, 5, 1) +
          '</div>' +
          selectInput("transformScale", "Scale factor", t.scale, [[-1, "-1"], [-0.5, "-0.5"], [0.5, "0.5"], [1.5, "1.5"], [2, "2"]]) +

      if (document.getElementById("transformCentreY")) attachNumberInput("transformCentreY", "transforms", "centreY", render);
      if (document.getElementById("transformVectorX")) attachNumberInput("transformVectorX", "transforms", "vectorX", render);
      if (document.getElementById("transformVectorY")) attachNumberInput("transformVectorY", "transforms", "vectorY", render);
      if (document.getElementById("transformAngle")) attachSelectInput("transformAngle", "transforms", "angle", render, true);
      if (document.getElementById("transformDirection")) attachSelectInput("transformDirection", "transforms", "direction", render);
      if (document.getElementById("transformScale")) attachSelectInput("transformScale", "transforms", "scale", render, true);
      attachAnimationButton("transformAnimate", "transforms");
    }

    function renderTransformDisplay() {
      const t = state.transforms;
      const finalShape = transformedShape(t, 1);
      const liveShape = transformedShape(t, t.progress);
      let content = markerDefs() + graphGrid(transformBounds, 1, 1);
      content += '<path class="shape-original" d="' + polygonPath(baseShape, transformBounds) + '"/>';
      content += '<path class="shape-final" d="' + polygonPath(finalShape, transformBounds) + '"/>';
      content += '<path class="shape-live" d="' + polygonPath(liveShape, transformBounds) + '"/>';
      content += labelShape(baseShape, transformBounds, "");
      content += labelShape(finalShape, transformBounds, "'");
      if (t.model === "translation") {
        content += vectorFromPoints(baseShape[0], finalShape[0], transformBounds);
      } else {
        content += centreMark(t.centreX, t.centreY, transformBounds, "Centre");
        content += vectorFromPoints({ x: t.centreX, y: t.centreY }, liveShape[0], transformBounds, "highlight-line");
      }

    function renderCircleEquationControls() {
      const c = state.circleEq;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        slider("circleEqH", "Centre h", -6, 6, 0.5, c.h) +
        slider("circleEqK", "Centre k", -4, 4, 0.5, c.k) +
        slider("circleEqR", "Radius r", 1, 6, 0.5, c.r) +
        actionButton("circleEqAnimate", "Animate Circle");
      attachSlider("circleEqH", "circleEq", "h", render);
      attachSlider("circleEqK", "circleEq", "k", render);
      attachSlider("circleEqR", "circleEq", "r", render);
      attachAnimationButton("circleEqAnimate", "circleEq");
    }

    function renderCircleEquationDisplay() {
      const c = state.circleEq;
      const live = {
        h: c.h * c.progress,
        k: c.k * c.progress,
        r: 1 + (c.r - 1) * c.progress
      };
      const unitCentre = { x: graphX(0, circleEqBounds), y: graphY(0, circleEqBounds) };
      const unitRadius = Math.abs(graphX(1, circleEqBounds) - graphX(0, circleEqBounds));
      const centre = { x: graphX(live.h, circleEqBounds), y: graphY(live.k, circleEqBounds) };
      const radiusPoint = { x: graphX(live.h + live.r, circleEqBounds), y: graphY(live.k, circleEqBounds) };
      const targetCentre = { x: graphX(c.h, circleEqBounds), y: graphY(c.k, circleEqBounds) };
      const targetRadius = Math.abs(graphX(c.h + c.r, circleEqBounds) - graphX(c.h, circleEqBounds));
      const pixelRadius = Math.abs(graphX(live.h + live.r, circleEqBounds) - graphX(live.h, circleEqBounds));
      let content = graphGrid(circleEqBounds, 1, 1);
      content += '<circle class="base-curve" cx="' + unitCentre.x.toFixed(1) + '" cy="' + unitCentre.y.toFixed(1) + '" r="' + unitRadius.toFixed(1) + '"/>';
      if (c.progress < 0.995) {
        content += '<circle class="target-curve" cx="' + targetCentre.x.toFixed(1) + '" cy="' + targetCentre.y.toFixed(1) + '" r="' + targetRadius.toFixed(1) + '"/>';
      }
      content += '<circle class="circle-line circle-equation-line" cx="' + centre.x.toFixed(1) + '" cy="' + centre.y.toFixed(1) + '" r="' + pixelRadius.toFixed(1) + '"/>';
      content += line(centre, radiusPoint, "highlight-line");
      content += dotWithDrag(centre, "C", "circleEqCenter", 18, -16);
      content += dotWithDrag(radiusPoint, "R", "circleEqRadius", 16, -14);
      content += '<text class="math-label" x="' + (centre.x + pixelRadius / 2 - 8).toFixed(1) + '" y="' + (centre.y - 14).toFixed(1) + '">r = ' + round(live.r, 1) + '</text>';
      boardTitle.textContent = "Equation of a Circle";
      boardEquation.innerHTML = circleEquationHtml(c.h, c.k, c.r);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function circleBase() {
      return '<rect width="1000" height="650" fill="white"/>' +
        '<circle class="circle-line" cx="' + circle.cx + '" cy="' + circle.cy + '" r="' + circle.r + '"/>' +
        '<circle class="point-dot" cx="' + circle.cx + '" cy="' + circle.cy + '" r="6"/>' +
        '<text class="label-text" x="' + (circle.cx + 12) + '" y="' + (circle.cy - 12) + '">O</text>';
    }

    function arcPath(startDeg, endDeg, radius = 44, cx = circle.cx, cy = circle.cy) {
      const start = point(startDeg, radius, cx, cy);
      const end = point(endDeg, radius, cx, cy);
      const diff = (endDeg - startDeg + 360) % 360;
      const large = diff > 180 ? 1 : 0;
      return 'M ' + start.x.toFixed(1) + ' ' + start.y.toFixed(1) + ' A ' + radius + ' ' + radius + ' 0 ' + large + ' 1 ' + end.x.toFixed(1) + ' ' + end.y.toFixed(1);
    }

    function minorArcPath(startDeg, endDeg, radius = 44, cx = circle.cx, cy = circle.cy) {
      const diff = normalizeAngle(endDeg - startDeg);
      return diff > 180 ? arcPath(endDeg, startDeg, radius, cx, cy) : arcPath(startDeg, endDeg, radius, cx, cy);
    }

      });
    }

    function renderCentreCircumference() {

      const B = point(c.centreB);
      const P = point(c.centreP);

        '<text class="math-label" x="' + pointLabel.x.toFixed(1) + '" y="' + pointLabel.y.toFixed(1) + '">' + round(circAngle) + '&#176;</text>');

    function renderSameSegment() {
      const c = state.circles;

      const B = point(c.sameB);
      const P = point(c.sameP);
      const Q = point(c.sameQ);
      const angleP = angleBetween(A, P, B);

        '<text class="math-label" x="' + labelP.x.toFixed(1) + '" y="' + labelP.y.toFixed(1) + '">' + round(angleP) + '&#176;</text>' +

    function renderCyclicQuadrilateral() {

      svg(circleBase() +

        dotWithDrag(A, "A", "quadA") + dotWithDrag(B, "B", "quadB", -34, -14) + dotWithDrag(C, "C", "quadC", -34, 22) + dotWithDrag(D, "D", "quadD", 18, 24) +
        '<text class="math-label" x="' + labelB.x.toFixed(1) + '" y="' + labelB.y.toFixed(1) + '">' + round(angleB) + '&#176;</text>' +
        '<text class="math-label" x="' + labelD.x.toFixed(1) + '" y="' + labelD.y.toFixed(1) + '">' + round(angleD) + '&#176;</text>' +

    function renderTangentRadius() {
      const T = point(state.circles.tangentT);
      const O = { x: circle.cx, y: circle.cy };
      const vx = T.x - O.x;
      const vy = T.y - O.y;
      const length = Math.hypot(vx, vy);
      const tx = -vy / length;
      const ty = vx / length;
      const L = { x: T.x - tx * 245, y: T.y - ty * 245 };
      const R = { x: T.x + tx * 245, y: T.y + ty * 245 };
      const label = angleLabelPoint(O, T, R, 54);
      boardTitle.textContent = "Tangent and Radius";
      boardEquation.innerHTML = "Radius &#8869; tangent";
      svg(circleBase() +
        line(O, T, "highlight-line") +
        line(L, R, "theorem-line") +
        dotWithDrag(T, "T", "tangentT") +
        '<text class="math-label" x="' + label.x.toFixed(1) + '" y="' + label.y.toFixed(1) + '">90&#176;</text>');
    }

    function renderCircleDisplay() {
      const model = state.circles.model;
      if (model === "centre-circumference") renderCentreCircumference();
      if (model === "same-segment") renderSameSegment();
      if (model === "cyclic-quadrilateral") renderCyclicQuadrilateral();
      if (model === "tangent-radius") renderTangentRadius();
    }

    function trigValue(name, xDeg) {
      const t = xDeg * Math.PI / 180;
      if (name === "sine") return Math.sin(t);
      if (name === "cosine") return Math.cos(t);
      return Math.tan(t);
    }

    function renderTrigControls() {
      const t = state.trig;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        slider("trigA", "Amplitude / scale a", -3, 3, 0.5, t.a) +
        slider("trigB", "Horizontal scale b", 0.5, 3, 0.5, t.b) +
        slider("trigH", "Phase shift h", -180, 180, 15, t.h) +
        slider("trigK", "Vertical shift k", -3, 3, 0.5, t.k) +
        checkbox("trigOriginal", "Show original graph", t.original);
      attachSlider("trigA", "trig", "a", render);
      attachSlider("trigB", "trig", "b", render);
      attachSlider("trigH", "trig", "h", render);
      attachSlider("trigK", "trig", "k", render);
      attachCheckbox("trigOriginal", "trig", "original", render);
    }

    function trigPath(fn, bounds = trigBounds, samples = 720) {
      const pieces = [];
      let current = [];
      for (let i = 0; i <= samples; i++) {
        const x = bounds.xmin + (bounds.xmax - bounds.xmin) * i / samples;
        const y = fn(x);
        if (!Number.isFinite(y) || Math.abs(y) > 25) {
          if (current.length) pieces.push(current);
          current = [];
          continue;
        }
        current.push([graphX(x, bounds), graphY(clamp(y, bounds.ymin - 0.2, bounds.ymax + 0.2), bounds)]);
      }
      if (current.length) pieces.push(current);
      return pieces.map((part) => part.map((p, index) => (index ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ")).join(" ");
    }

    function renderTrigDisplay() {
      const t = state.trig;
      let content = graphGrid(trigBounds, 30, 1);
      if (t.model === "tangent") {
        for (let n = -3; n <= 5; n++) {
          const x = t.h + (90 + 180 * n) / t.b;
          if (x < trigBounds.xmin || x > trigBounds.xmax) continue;
          content += '<line x1="' + graphX(x, trigBounds) + '" y1="0" x2="' + graphX(x, trigBounds) + '" y2="' + graphHeight + '" stroke="#f97316" stroke-width="2" stroke-dasharray="8 7"/>';
        }
      }
      if (t.original) content += '<path class="base-curve" d="' + trigPath((x) => trigValue(t.model, x), trigBounds) + '"/>';
      const transformed = (x) => t.a * trigValue(t.model, t.b * (x - t.h)) + t.k;
      content += '<path class="secondary-curve" d="' + trigPath(transformed, trigBounds) + '"/>';
      boardTitle.textContent = models.trig.find((item) => item[0] === t.model)[1];
      boardEquation.innerHTML = formatTrigEquation(t);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function renderComplexControls() {
      const c = state.complex;
      controlPanel.innerHTML = '<h2>Controls</h2>' +
        '<div class="input-grid">' +
        numberInput("complexReal", "Real part", c.real, -6, 6, 1) +
        numberInput("complexImag", "Imaginary part", c.imag, -5, 5, 1) +
        '</div>' +
        selectInput("complexModulus", "Multiplier r", c.modulus, [[0.5, "0.5"], [1, "1"], [1.5, "1.5"], [2, "2"], [3, "3"]]) +
        selectInput("complexAngle", "Angle θ", c.angle, [[30, "30°"], [45, "45°"], [60, "60°"], [90, "90°"], [180, "180°"], [270, "270°"]]) +
        actionButton("complexAnimate", "Animate Multiplication");
      attachNumberInput("complexReal", "complex", "real", render);
      attachNumberInput("complexImag", "complex", "imag", render);
      attachSelectInput("complexModulus", "complex", "modulus", render, true);
      attachSelectInput("complexAngle", "complex", "angle", render, true);
      attachAnimationButton("complexAnimate", "complex");
    }

    function renderComplexDisplay() {
      const c = state.complex;
      const z = complexPoint(c.real, c.imag);
      const live = complexProduct(c, c.progress);
      const final = complexProduct(c, 1);
      const origin = { x: 0, y: 0 };
      const zSvg = pointToSvg(z, complexBounds);
      const liveSvg = pointToSvg(live, complexBounds);
      const finalSvg = pointToSvg(final, complexBounds);
      let content = markerDefs() + graphGrid(complexBounds, 1, 1);
      content += vectorFromPoints(origin, z, complexBounds, "theorem-line");
      content += vectorFromPoints(origin, final, complexBounds, "shape-final");
      content += vectorFromPoints(origin, live, complexBounds, "vector-line");
      content += '<circle class="point-dot" cx="' + zSvg.x.toFixed(1) + '" cy="' + zSvg.y.toFixed(1) + '" r="7"/>';
      content += '<circle class="drag-ring" cx="' + finalSvg.x.toFixed(1) + '" cy="' + finalSvg.y.toFixed(1) + '" r="11"/>';
      content += '<circle class="point-dot" cx="' + liveSvg.x.toFixed(1) + '" cy="' + liveSvg.y.toFixed(1) + '" r="7"/>';
      content += '<text class="label-text" x="' + (zSvg.x + 12).toFixed(1) + '" y="' + (zSvg.y - 12).toFixed(1) + '">z</text>';
      content += '<text class="label-text" x="' + (finalSvg.x + 12).toFixed(1) + '" y="' + (finalSvg.y - 12).toFixed(1) + '">w</text>';
      boardTitle.textContent = "Complex Plane Transformation";
      boardEquation.innerHTML = "z = " + complexText(c.real, c.imag) + ", w = " + round(c.modulus, 1) + "cis(" + round(c.angle, 0) + "&deg;)z";
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function renderCalculusControls() {
      const c = state.calculus;
      let controls = '<h2>Controls</h2>';
      if (c.model === "tangent") {
        controls += slider("calculusX", "Point x", -4, 4, 0.5, c.x) +
          slider("calculusH", "Starting gap h", 0.5, 4, 0.5, c.h) +
          actionButton("calculusAnimate", "Animate Secant to Tangent");
      } else {
        controls += slider("calculusRectangles", "Rectangles", 2, 16, 1, c.rectangles) +
          actionButton("calculusAnimate", "Animate Rectangles");
      }
      controlPanel.innerHTML = controls;
      if (document.getElementById("calculusX")) attachSlider("calculusX", "calculus", "x", render);
      if (document.getElementById("calculusH")) attachSlider("calculusH", "calculus", "h", render);
      if (document.getElementById("calculusRectangles")) attachSlider("calculusRectangles", "calculus", "rectangles", render);
      attachAnimationButton("calculusAnimate", "calculus");
    }

    function renderCalculusTangent() {
      const c = state.calculus;
      const curve = (x) => calculusFunction(x);
      const a = c.x;
      const h = Math.max(0.08, c.h * (1 - c.progress) + 0.08 * c.progress);
      const b = a + h;
      const fa = curve(a);
      const fb = curve(b);
      const secantGradient = (fb - fa) / (b - a);
      const tangentGradient = calculusDerivative(a);
      const secant = (x) => fa + secantGradient * (x - a);
      const tangent = (x) => fa + tangentGradient * (x - a);
      const A = pointToSvg({ x: a, y: fa }, calculusBounds);
      const B = pointToSvg({ x: b, y: fb }, calculusBounds);
      let content = graphGrid(calculusBounds, 1, 1);
      content += '<path class="main-curve" d="' + pathForFunction(curve, calculusBounds) + '"/>';
      content += '<path class="base-curve" d="' + pathForFunction(secant, calculusBounds) + '"/>';
      content += '<path class="secondary-curve" d="' + pathForFunction(tangent, calculusBounds) + '"/>';
      content += '<circle class="point-dot" cx="' + A.x.toFixed(1) + '" cy="' + A.y.toFixed(1) + '" r="7"/>';
      content += '<circle class="drag-ring" cx="' + B.x.toFixed(1) + '" cy="' + B.y.toFixed(1) + '" r="10"/>';
      content += '<text class="label-text" x="' + (A.x + 12).toFixed(1) + '" y="' + (A.y - 12).toFixed(1) + '">A</text>';
      content += '<text class="label-text" x="' + (B.x + 12).toFixed(1) + '" y="' + (B.y - 12).toFixed(1) + '">B</text>';
      boardTitle.textContent = "Secant to Tangent";
      boardEquation.innerHTML = calculusLabel() + ", tangent gradient = " + round(tangentGradient, 2);
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function renderCalculusArea() {
      const c = state.calculus;
      const curve = (x) => Math.max(0, calculusFunction(x) + 2);
      const a = -4;
      const b = 4;
      const n = Math.max(1, Math.round(2 + (c.rectangles - 2) * c.progress));
      const width = (b - a) / n;
      let content = graphGrid(calculusBounds, 1, 1);
      for (let i = 0; i < n; i++) {
        const left = a + i * width;
        const height = curve(left + width);
        const p = pointToSvg({ x: left, y: height }, calculusBounds);
        const base = pointToSvg({ x: left + width, y: 0 }, calculusBounds);
        const rectWidth = graphX(left + width, calculusBounds) - graphX(left, calculusBounds);
        const rectHeight = graphY(0, calculusBounds) - graphY(height, calculusBounds);
        content += '<rect class="calculus-area" x="' + p.x.toFixed(1) + '" y="' + p.y.toFixed(1) + '" width="' + rectWidth.toFixed(1) + '" height="' + rectHeight.toFixed(1) + '"/>';
        content += '<line class="grid-line" x1="' + base.x.toFixed(1) + '" y1="' + graphY(0, calculusBounds).toFixed(1) + '" x2="' + base.x.toFixed(1) + '" y2="' + graphY(height, calculusBounds).toFixed(1) + '"/>';
      }
      content += '<path class="main-curve" d="' + pathForFunction(curve, calculusBounds) + '"/>';
      boardTitle.textContent = "Area Under a Curve";
      boardEquation.innerHTML = "Area is approximated using " + n + " rectangles";
      svg(content, "0 0 " + graphWidth + " " + graphHeight);
    }

    function renderCalculusDisplay() {
      if (state.calculus.model === "area") renderCalculusArea();
      else renderCalculusTangent();
    }

    function currentModeState() {
      return state[state.mode];
    }

    function populateModelSelect() {
      const options = models[state.mode];
      modelSelect.innerHTML = options.map((item) => '<option value="' + item[0] + '">' + item[1] + '</option>').join("");
      modelSelect.value = currentModeState().model;
      modelNote.textContent = options.find((item) => item[0] === modelSelect.value)[2];
    }

    function renderControls() {
      if (state.mode === "graphs") renderGraphControls();
      if (state.mode === "transforms") renderTransformControls();
      if (state.mode === "circleEq") renderCircleEquationControls();
      if (state.mode === "circles") renderCircleControls();
      if (state.mode === "trig") renderTrigControls();
      if (state.mode === "complex") renderComplexControls();
      if (state.mode === "calculus") renderCalculusControls();
    }

    function renderDisplay() {
      if (state.mode === "graphs") renderGraphDisplay();
      if (state.mode === "transforms") renderTransformDisplay();
      if (state.mode === "circleEq") renderCircleEquationDisplay();
      if (state.mode === "circles") renderCircleDisplay();
      if (state.mode === "trig") renderTrigDisplay();
      if (state.mode === "complex") renderComplexDisplay();
      if (state.mode === "calculus") renderCalculusDisplay();
    }

    let activeDrag = null;

    function svgPointFromPointer(svgEl, event) {
      const rect = svgEl.getBoundingClientRect();
      const box = svgEl.viewBox && svgEl.viewBox.baseVal ? svgEl.viewBox.baseVal : { x: 0, y: 0, width: graphWidth, height: graphHeight };
      return {
        x: box.x + (event.clientX - rect.left) * box.width / (rect.width || 1),
        y: box.y + (event.clientY - rect.top) * box.height / (rect.height || 1)
      };
    }

    function angleFromPointer(svgEl, event) {
      const p = svgPointFromPointer(svgEl, event);
      return normalizeAngle(Math.atan2(p.y - circle.cy, p.x - circle.cx) * 180 / Math.PI + 90);
    }

    function graphCoordsFromPointer(svgEl, event, bounds) {
      const p = svgPointFromPointer(svgEl, event);
      return {
        x: bounds.xmin + p.x / graphWidth * (bounds.xmax - bounds.xmin),
        y: bounds.ymax - p.y / graphHeight * (bounds.ymax - bounds.ymin)
      };
    }

    function snapHalf(value) {
      return Math.round(value * 2) / 2;
    }

    function bindStageDrag() {
      const svgEl = stage.querySelector ? stage.querySelector("svg") : null;
      if (!svgEl || !svgEl.querySelectorAll) return;
      svgEl.querySelectorAll("[data-drag]").forEach((element) => {
        element.addEventListener("pointerdown", (event) => {
          activeDrag = element.dataset.drag;
          element.setPointerCapture?.(event.pointerId);
          event.preventDefault();
        });
      });
    }

    function startAnimation(target) {
      if (!state[target]) return;
      state[target].progress = 0;
      const raf = window.requestAnimationFrame || ((callback) => window.setTimeout(() => callback(Date.now()), 16));
      const caf = window.cancelAnimationFrame || window.clearTimeout;
      if (activeAnimation) caf(activeAnimation);
      const start = window.performance && window.performance.now ? window.performance.now() : Date.now();
      const duration = 3000;
      const step = (now) => {
        state[target].progress = clamp((now - start) / duration, 0, 1);
        renderDisplay();
        bindStageDrag();
        if (state[target].progress < 1) {
          activeAnimation = raf(step);
        } else {
          activeAnimation = null;
        }
      };
      activeAnimation = raf(step);
    }

    function handleDragMove(event) {
      if (!activeDrag || !stage.querySelector) return;
      const svgEl = stage.querySelector("svg");
      if (!svgEl) return;
      event.preventDefault();
      if (state.mode === "circles" && Object.prototype.hasOwnProperty.call(state.circles, activeDrag)) {
        state.circles[activeDrag] = Math.round(angleFromPointer(svgEl, event));
        render();
      }
      if (state.mode === "circleEq") {
        const p = graphCoordsFromPointer(svgEl, event, circleEqBounds);
        if (activeDrag === "circleEqCenter") {
          state.circleEq.h = snapHalf(clamp(p.x, -6, 6));
          state.circleEq.k = snapHalf(clamp(p.y, -4, 4));
          render();
        }
        if (activeDrag === "circleEqRadius") {
          const radius = Math.hypot(p.x - state.circleEq.h, p.y - state.circleEq.k);
          state.circleEq.r = snapHalf(clamp(radius, 1, 6));
          render();
        }
      }
    }

    function render() {
      populateModelSelect();
      renderControls();
      renderDisplay();
      bindStageDrag();
    }

    function resetCurrent() {
      if (state.mode === "graphs") {
        state.graphs = { model: state.graphs.model, progress: 1, a: 1, b: 1, h: 0, k: 0, original: true, points: true };
      }
      if (state.mode === "transforms") {
        state.transforms = { model: state.transforms.model, progress: 1, centreX: 1, centreY: 1, angle: 90, direction: "anticlockwise", vectorX: 4, vectorY: 2, scale: 2 };
      }
      if (state.mode === "circleEq") {
        state.circleEq = { model: state.circleEq.model, progress: 1, h: 2, k: -1, r: 4 };
      }
      if (state.mode === "circles") {
        state.circles = {
          model: state.circles.model,
          centreA: 305,
          centreB: 55,
          centreP: 180,
          sameA: 235,
          sameB: 125,
          sameP: 265,
          sameQ: 95,
          quadA: 35,
          quadB: 140,
          quadC: 220,
          quadD: 315,
          tangentT: 45
        };
      }
      if (state.mode === "trig") {
        state.trig = { model: state.trig.model, a: 1, b: 1, h: 0, k: 0, original: true };
      }
      if (state.mode === "complex") {
        state.complex = { model: state.complex.model, progress: 1, real: 3, imag: 1, modulus: 1.5, angle: 90 };
      }
      if (state.mode === "calculus") {
        state.calculus = { model: state.calculus.model, progress: 1, x: 2, h: 3, rectangles: 6 };
      }
      render();
    }

    modeButtons.addEventListener("click", (event) => {
      const button = event.target.closest("[data-mode]");
      if (!button) return;
      state.mode = button.dataset.mode;
      modeButtons.querySelectorAll("[data-mode]").forEach((btn) => btn.classList.toggle("active", btn === button));
      render();
    });

    modelSelect.addEventListener("change", () => {
      currentModeState().model = modelSelect.value;
      if (Object.prototype.hasOwnProperty.call(currentModeState(), "progress")) currentModeState().progress = 1;
      render();
    });

    window.addEventListener("pointermove", handleDragMove);
    window.addEventListener("pointerup", () => { activeDrag = null; });
    window.addEventListener("pointercancel", () => { activeDrag = null; });

    document.getElementById("resetBtn").addEventListener("click", resetCurrent);
    document.getElementById("fullscreenBtn").addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await board.requestFullscreen?.();
        board.classList.add("fullscreen");
      } else {
        await document.exitFullscreen?.();
      }
    });
    document.addEventListener("fullscreenchange", () => {
      board.classList.toggle("fullscreen", Boolean(document.fullscreenElement));
      document.getElementById("fullscreenBtn").textContent = document.fullscreenElement ? "Exit Full Screen" : "Full Screen";
    });

    render();
  </script>
  <script src="../_shared/classroom-standard.js?v=classroom-standard-2"></script>
</body>
</html>
