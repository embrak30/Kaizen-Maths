<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ninja Math Challenge</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --ink: #153149;
      --muted: #5f6f86;
      --blue: #2563eb;
      --blue-dark: #1e40af;
      --green: #28a66a;
      --lime: #85c84a;
      --teal: #17b8b3;
      --violet: #6f4cc3;
      --line: rgba(21, 49, 73, 0.12);
      --shadow: 0 16px 38px rgba(21, 49, 73, 0.16);
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 18px;
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(23, 184, 179, 0.22), transparent 30rem),
        radial-gradient(circle at 82% 18%, rgba(111, 76, 195, 0.18), transparent 28rem),
        radial-gradient(circle at center, #ffffff, #e7f8fb);
      overflow-x: hidden;
    }

    .app {
      width: min(1020px, 100%);
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(240, 253, 250, 0.92)),
        #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 20px 22px;
      background:
        linear-gradient(135deg, rgba(111, 76, 195, 0.14), rgba(23, 184, 179, 0.14)),
        #ffffff;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .header p {
      margin: 8px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.5;
    }

    .stage {
      display: grid;
      gap: 16px;
      padding: 20px;
      align-content: start;
    }

    .controls,
    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .difficulty-btn,
    .action-btn {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      background: linear-gradient(145deg, var(--blue), var(--blue-dark));
      color: #fff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
    }

    .difficulty-btn:hover:enabled,
    .action-btn:hover:enabled {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .difficulty-btn.active {
      background: linear-gradient(145deg, var(--violet), var(--teal));
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
      filter: grayscale(0.1);
    }

    .timer-card {
      min-width: 240px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 4px 14px rgba(21, 49, 73, 0.08);
      font-size: 1.3rem;
      font-weight: 900;
    }

    .timer-card.warning { color: #b45309; }
    .timer-card.done { color: #b91c1c; }

    .numbers {
      display: grid;
      grid-template-columns: repeat(2, 150px);
      gap: 26px;
      justify-content: center;
      margin: 8px auto;
    }

    .number {
      width: 150px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      background:
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.34), transparent 34%),
        linear-gradient(135deg, var(--green), var(--lime));
      color: #fff;
      box-shadow: 7px 8px 18px rgba(21, 49, 73, 0.22);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 4.2rem;
      font-weight: 950;
      user-select: none;
    }

    .message {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px 16px;
      border: 1px solid rgba(23, 184, 179, 0.24);
      border-radius: 8px;
      background: rgba(240, 253, 250, 0.86);
      color: #134e4a;
      text-align: center;
      font-weight: 800;
      line-height: 1.45;
    }

    .show-row {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .show-row.visible { display: flex; }

    .solution-steps {
      width: min(820px, 100%);
      display: grid;
      gap: 10px;
      margin: 0 auto;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .step {
      padding: 14px 16px;
      border-left: 5px solid #0c5460;
      border-radius: 8px;
      background: #d1ecf1;
      color: #0c5460;
      text-align: left;
      font-weight: 850;
    }

    @media (max-width: 620px) {
      body { padding: 10px; }
      .stage { padding: 14px; }
      .numbers {
        grid-template-columns: repeat(2, minmax(110px, 1fr));
        gap: 14px;
      }
      .number {
        width: 100%;
        font-size: 3.2rem;
      }
      .timer-card {
        width: 100%;
        text-align: center;
      }
    }
  </style>
  <link rel="stylesheet" href="../_shared/classroom-standard.css?v=classroom-standard-3">
  <script src="../../auth-config.js?v=tool-access-guard-2"></script>
  <script src="../_shared/tool-access-guard.js?v=tool-access-guard-2"></script>

</head>
<body>
  <main class="app" role="application" aria-label="Ninja Math Challenge">
    <header class="header">
      <h1>Ninja Math Challenge</h1>
      <p>A 24-style classroom number game. Use the four numbers once each with operations to make 24, then reveal one possible solution when time is up.</p>
    </header>

    <section class="stage">
      <div class="controls" aria-label="Difficulty">
        <button class="difficulty-btn" id="easy" type="button" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" id="medium" type="button" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" id="hard" type="button" onclick="setDifficulty('hard')">Hard</button>
      </div>

      <div class="action-row">
        <button class="action-btn" id="generateBtn" type="button" onclick="generateNumbers()" disabled>Generate Numbers</button>
        <div class="timer-card" id="timerCard">Time left: <span id="time">30</span> seconds</div>
        <button class="action-btn" id="addTimeBtn" type="button" onclick="addTime()" disabled>Add 30 Seconds</button>
      </div>

      <p class="message" id="message">Choose a difficulty, then generate a solvable set of four numbers.</p>
      <div class="numbers" id="numbers" aria-label="Number cards"></div>

      <div class="show-row" id="showRow">
        <button class="action-btn" id="showSolutionBtn" type="button" onclick="showSolution()">Show Solution</button>
        <button class="action-btn" id="newGameBtn" type="button" onclick="resetGame()">New Game</button>
      </div>

      <div class="solution-steps" id="solutionSteps"></div>
    </section>
  </main>

  <script>
    let timer = null;
    let timeLeft = 30;
    let generatedNumbers = [];
    let selectedDifficulty = "";
    let currentSolution = [];

    const difficultyRanges = {
      easy: [1, 6],
      medium: [1, 9],
      hard: [1, 12]
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function setMessage(text) {
      byId("message").textContent = text;
    }

    function setDifficulty(level) {
      selectedDifficulty = level;
      document.querySelectorAll(".difficulty-btn").forEach((button) => {
        button.classList.toggle("active", button.id === level);
      });
      byId("generateBtn").disabled = false;
      setMessage("Difficulty selected. Generate numbers when you are ready.");
    }

    function updateTimerDisplay() {
      byId("time").textContent = String(timeLeft);
      const timerCard = byId("timerCard");
      timerCard.classList.toggle("warning", timeLeft > 0 && timeLeft <= 10);
      timerCard.classList.toggle("done", timeLeft <= 0);
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
    }

    function startTimer() {
      stopTimer();
      timer = setInterval(() => {
        timeLeft -= 1;
        updateTimerDisplay();
        if (timeLeft <= 0) {
          stopTimer();
          byId("showRow").classList.add("visible");
          setMessage("Time is up. Show a solution or start a new game.");
        }
      }, 1000);
    }

    function randomNumberForDifficulty() {
      const [min, max] = difficultyRanges[selectedDifficulty] || difficultyRanges.medium;
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateNumbers() {
      let set;
      let solution;
      let attempts = 0;

      do {
        attempts += 1;
        set = Array.from({ length: 4 }, randomNumberForDifficulty);
        solution = find24Solution(set);
      } while (!solution.length && attempts < 800);

      if (!solution.length) {
        setMessage("Could not find a solvable set quickly. Try Generate Numbers again.");
        return;
      }

      generatedNumbers = set;
      currentSolution = solution;
      const numbers = byId("numbers");
      numbers.innerHTML = "";
      set.forEach((number) => {
        const div = document.createElement("div");
        div.className = "number";
        div.textContent = number;
        numbers.appendChild(div);
      });

      byId("addTimeBtn").disabled = false;
      byId("showRow").classList.remove("visible");
      byId("solutionSteps").innerHTML = "";
      timeLeft = 30;
      updateTimerDisplay();
      startTimer();
      setMessage("Use each number once. Combine them with +, -, x, or ÷ to make 24.");
    }

    function addTime() {
      timeLeft += 30;
      updateTimerDisplay();
      if (!timer && generatedNumbers.length) startTimer();
    }

    function showSolution() {
      const steps = currentSolution.length ? currentSolution : find24Solution(generatedNumbers);
      byId("solutionSteps").innerHTML = steps.length
        ? steps.map((step, index) => `<div class="step">Step ${index + 1}: ${step}</div>`).join("")
        : `<div class="step">No integer-only solution found.</div>`;
    }

    function resetGame() {
      stopTimer();
      timeLeft = 30;
      generatedNumbers = [];
      currentSolution = [];
      selectedDifficulty = "";
      updateTimerDisplay();
      byId("numbers").innerHTML = "";
      byId("solutionSteps").innerHTML = "";
      byId("showRow").classList.remove("visible");
      byId("addTimeBtn").disabled = true;
      byId("generateBtn").disabled = true;
      document.querySelectorAll(".difficulty-btn").forEach((button) => button.classList.remove("active"));
      setMessage("Choose a difficulty, then generate a solvable set of four numbers.");
    }

    function applyOperation(a, b, op) {
      if (op === "+") return a + b;
      if (op === "-") return a - b;
      if (op === "*") return a * b;
      if (op === "/" && b !== 0) return a / b;
      return null;
    }

    function operationLabel(op) {
      if (op === "*") return "x";
      return op;
    }

    function find24Solution(nums) {
      const operations = ["+", "-", "*", "/"];
      const start = nums.map((value) => ({ value, expr: String(value), steps: [] }));

      function search(items) {
        if (items.length === 1) {
          return Math.abs(items[0].value - 24) < 1e-9 && Number.isInteger(items[0].value)
            ? items[0].steps
            : null;
        }

        for (let i = 0; i < items.length; i += 1) {
          for (let j = 0; j < items.length; j += 1) {
            if (i === j) continue;

            const left = items[i];
            const right = items[j];
            const rest = items.filter((_, index) => index !== i && index !== j);

            for (const op of operations) {
              if ((op === "+" || op === "*") && j < i) continue;
              const result = applyOperation(left.value, right.value, op);
              if (result === null || !Number.isInteger(result) || result < 0) continue;

              const label = `${left.expr} ${operationLabel(op)} ${right.expr} = ${result}`;
              const next = {
                value: result,
                expr: String(result),
                steps: left.steps.concat(right.steps, label)
              };

              const found = search(rest.concat(next));
              if (found) return found;
            }
          }
        }

        return null;
      }

      return search(start) || [];
    }

    updateTimerDisplay();
  </script>
  <script src="../_shared/classroom-standard.js?v=classroom-standard-3"></script>
</body>
</html>
