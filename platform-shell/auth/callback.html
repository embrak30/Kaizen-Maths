<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in | Kaizen Maths</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=kaizen-k-1">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background:
        radial-gradient(circle at 18% 16%, rgba(111, 76, 195, 0.18), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(23, 184, 179, 0.18), transparent 34%),
        #f4f7fb;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 32px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(103, 112, 133, 0.18);
      box-shadow: 0 16px 40px rgba(44, 35, 91, 0.11);
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Signing you in...</h1>
    <p id="status">You will be returned to Kaizen Maths in a moment.</p>
  </main>
  <script src="../auth-config.js?v=auth-foundation-9"></script>
  <script type="module">
    const config = window.KAIZEN_AUTH_CONFIG || {};
    const homeUrl = new URL("/#/", window.location.origin).toString();
    const status = document.getElementById("status");

    function showError(message) {
      document.querySelector("h1").textContent = "Sign-in needs one more check";
      const diagnostic = [
        `Current URL: ${window.location.href}`,
        `Search: ${window.location.search || "(empty)"}`,
        `Hash: ${window.location.hash || "(empty)"}`
      ].join("<br>");
      status.innerHTML = `${message}<br><br><code>${diagnostic}</code><br><br><strong>Copy this message and send it to Codex.</strong>`;
    }

    async function finishSignIn() {
      if (!config.supabaseUrl || !config.supabaseAnonKey) {
        showError("Supabase is not configured on this site.");
        return;
      }

      const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
      const supabase = createClient(config.supabaseUrl, config.supabaseAnonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      const params = new URLSearchParams(window.location.search);
      if (params.has("code")) {
        const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
        if (error) {
          showError(`Callback exchange failed: ${error.message}`);
          return;
        }
      }

      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const accessToken = hashParams.get("access_token");
      const refreshToken = hashParams.get("refresh_token");
      if (accessToken && refreshToken) {
        const { error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });
        if (error) {
          showError(`Session save failed: ${error.message}`);
          return;
        }
      }

      const { data, error: sessionError } = await supabase.auth.getSession();
      if (sessionError) {
        showError(`Session check failed: ${sessionError.message}`);
        return;
      }

      if (!data.session) {
        showError("No Supabase session was created. Check that Google Provider is enabled and saved in Supabase.");
        return;
      }

      window.location.replace(homeUrl);
    }

    finishSignIn().catch((error) => {
      showError(`Unexpected callback error: ${error.message}`);
    });
  </script>
</body>
</html>
