<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in | Kaizen Maths</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=kaizen-k-1">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background:
        radial-gradient(circle at 18% 16%, rgba(111, 76, 195, 0.18), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(23, 184, 179, 0.18), transparent 34%),
        #f4f7fb;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 32px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(103, 112, 133, 0.18);
      box-shadow: 0 16px 40px rgba(44, 35, 91, 0.11);
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Signing you in...</h1>
    <p>You will be returned to Kaizen Maths in a moment.</p>
  </main>
  <script src="../auth-config.js?v=auth-foundation-2"></script>
  <script type="module">
    const config = window.KAIZEN_AUTH_CONFIG || {};
    const homeUrl = new URL("/#/", window.location.origin).toString();

    async function finishSignIn() {
      if (!config.supabaseUrl || !config.supabaseAnonKey) {
        window.location.replace(homeUrl);
        return;
      }

      const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
      const supabase = createClient(config.supabaseUrl, config.supabaseAnonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      const params = new URLSearchParams(window.location.search);
      if (params.has("code")) {
        const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
        if (error) console.warn("Kaizen sign-in callback:", error.message);
      }

      window.location.replace(homeUrl);
    }

    finishSignIn().catch((error) => {
      console.warn("Kaizen sign-in callback:", error.message);
      window.location.replace(homeUrl);
    });
  </script>
</body>
</html>
